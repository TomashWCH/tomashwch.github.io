    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-text-size-adjust:100%}
  body{padding:0 0 90px;max-width:560px;margin:0 auto;min-height:100vh}
  .wrap{padding:0 14px}
  h1,h2,h3{font-family:Oswald,sans-serif;margin:0;letter-spacing:.5px}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0F1511,#0F1511 70%,rgba(15,21,17,0));
    padding:14px 14px 10px;display:flex;align-items:center;gap:10px}
  .badge{font-family:Oswald;font-weight:700;font-size:13px;color:#0F1511;background:var(--gold);
    padding:3px 8px;border-radius:6px;line-height:1.1}
  .ttl{font-size:20px;font-weight:700;text-transform:uppercase;line-height:1}
  .ttl small{display:block;font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:500}
  .spacer{flex:1}
  .icon-btn{background:transparent;border:1px solid #2C382F;color:#CDD3CC;border-radius:8px;
    padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer}
  .icon-btn:active{transform:scale(.97)}
  .card{background:var(--card);color:var(--ink);border-radius:14px;padding:16px;margin:12px 0;
    box-shadow:0 1px 0 rgba(0,0,0,.04)}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px}
  input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold)}
  button.primary{width:100%;padding:13px;border:0;border-radius:11px;background:var(--gold);
    color:#241a05;font-family:Oswald;font-weight:700;font-size:16px;letter-spacing:.5px;
    text-transform:uppercase;cursor:pointer;margin-top:14px}
  button.primary:active{transform:scale(.99)}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .muted{color:var(--muted);font-size:13px}
  .err{color:var(--red);font-size:13px;margin-top:8px;font-weight:500}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}

  /* tabs */
  .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    background:#101712;border-top:1px solid #25302A;display:flex;z-index:30}
  .tabbar button{flex:1;background:transparent;border:0;color:#8A918A;padding:11px 0 14px;
    font-family:Oswald;font-weight:600;font-size:13px;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
  .tabbar button.on{color:var(--gold)}
  .tabbar .dot{display:block;font-size:18px;margin-bottom:2px}

  /* match */
  .match{background:var(--card);color:var(--ink);border-radius:14px;margin:12px 0;overflow:hidden}
  .m-top{display:flex;justify-content:space-between;align-items:center;

    background:#F1EEE5;border-bottom:1px solid var(--line)}
  .stage{text-transform:uppercase}
  .pill{padding:2px 8px;border-radius:20px;font-weight:700;font-size:10px}
  .pill.open{background:#E3F2E9;color:var(--green)}
  .pill.live{background:#FBE9D9;color:var(--red)}

  .picks{border-top:1px dashed var(--line);margin-top:2px;padding:10px 14px 14px}
  .picks h4{margin:0 0 8px;font-family:Oswald;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}

  .prow .pv{font-family:Oswald;font-weight:700;font-size:15px}

  .crown{font-size:16px}

  .listitem:last-child{border-bottom:0}
  .listitem .g{flex:1}
  .listitem .g b{font-family:Oswald;font-size:15px}
  .tag{background:var(--chip);border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;color:#555}
  .danger{color:var(--red);background:#fff;border:1px solid #E7C7BF;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:600;cursor:pointer}
  .ok-note{background:#EAF4EE;color:#246B43;border-radius:10px;padding:10px;font-size:13px;font-weight:500;margin-top:8px}
  .center{text-align:center}
  .logo{text-align:center;padding:26px 0 6px}
  .logo .ball{font-size:46px}
  .logo h1{font-size:34px;margin-top:6px;text-transform:uppercase}
  .logo p{letter-spacing:3px;color:var(--gold);font-size:12px;margin:2px 0 0}
  .switch{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .switch .lbl{font-size:13px;font-weight:600;color:var(--ink)}
  .tg{width:48px;height:28px;border-radius:20px;background:#D8D4C8;position:relative;cursor:pointer;flex:none}
  .tg.on{background:var(--green)}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s}
  .tg.on::after{left:23px}
  .foot{text-align:center;color:#4C544C;font-size:11px;padding:20px 0 6px;line-height:1.6}
</style>
</head>

/* ---------- Helpers ---------- */
const $=(id)=>document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmt(ms){return new Date(ms).toLocaleString('pl-PL',{timeZone:'Europe/Warsaw',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(',','');}
function statusOf(m){const n=Date.now();if(m.done)return'done';if(n>=m.kickoff)return'live';return'open';}
function winProb(a,b){return 1/(1+Math.pow(10,-((a-b)/400)));} // a vs b, two-way
function matchOdds(m){
  if(m.pH!=null){return {three:true,h:m.pH,d:m.pD,a:m.pA};}
  let ea=team(m.home).e+(HOSTS[m.home]?55:0), eb=team(m.away).e+(HOSTS[m.away]?55:0);
  let p=winProb(ea,eb);return {three:false,h:+(p*100).toFixed(0),a:+((1-p)*100).toFixed(0)};
}
function sortedMatches(){return Object.entries(MATCH).map(([id,m])=>({id,...m})).sort((x,y)=>x.kickoff-y.kickoff);}
function standings(){
  return Object.entries(PART).map(([pid,p])=>{
    let correct=0;
    Object.entries(MATCH).forEach(([mid,m])=>{
      if(!m.done)return;const pr=PRED[mid]&&PRED[mid][pid];
      if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))correct++;
    });
    const start=Number(p.start||0);
    return {pid,name:p.name,start,correct,total:start+correct};
  }).sort((a,b)=> b.total-a.total || b.correct-a.correct || a.name.localeCompare(b.name,'pl'));
}

firebase.auth().onAuthStateChanged(u=>{ if(u&&!booted){booted=true; attach(); maybeSeed();} });

function attach(){
  db.ref('config').on('value',s=>{CFG=s.val()||{};render();});
  db.ref('participants').on('value',s=>{PART=s.val()||{};render();});
  db.ref('matches').on('value',s=>{MATCH=s.val()||{};render();});
  db.ref('predictions').on('value',s=>{PRED=s.val()||{};render();});
}
function maybeSeed(){
  db.ref('config/seeded').transaction(cur=>cur===true?undefined:true,(err,committed)=>{
    if(committed){
      const up={};
      SEED.forEach(m=>{up['matches/'+m.id]={home:m.home,away:m.away,kickoff:new Date(m.iso).getTime(),stage:m.stage,
        pH:m.pH!=null?m.pH:null,pD:m.pD!=null?m.pD:null,pA:m.pA!=null?m.pA:null};});
      db.ref().update(up);
    }
  });
}

/* ---------- Render ---------- */
function render(){
  if(!booted)return;
  // first run: admin password not set
  if(CFG.adminPassword==null && !ADMIN){ renderFirstRun(); return; }
  if(ADMIN){ renderAdmin(); return; }
  if(!ME || !PART[ME]){ renderLogin(); return; }
  renderMain();
}

}

    <div class="logo"><div class="ball">⚽</div><h1>Liga Typera</h1><p>JYSK</p></div>
    <div class="card">
      <h3 style="font-size:18px">Pierwsze uruchomienie</h3>
      <p class="muted">Ustaw hasło administratora (Twoje). Dzięki niemu będziesz dodawać uczestników, punkty startowe i wpisywać wyniki.</p>
      <label>Hasło administratora</label>
      <input id="ap" type="password" placeholder="np. tajne-haslo">
      <button class="primary" onclick="setupAdmin()">Załóż ligę</button>
      <div class="hint">Mecze MŚ 2026 wgrają się automatycznie po założeniu ligi.</div>
    </div></div>`;
}
function setupAdmin(){
  const v=$('ap').value.trim(); if(v.length<4){alert('Hasło min. 4 znaki.');return;}
  db.ref('config').update({adminPassword:v,leagueName:'LIGA TYPERA JYSK',showBeforeKickoff:true})
    .then(()=>{ADMIN=true;sessionStorage.setItem('typer_jysk_admin','1');render();});
}

function renderLogin(){
  $('tabs').innerHTML='';
  const opts=Object.entries(PART).map(([pid,p])=>`<option value="${pid}">${esc(p.name)}</option>`).join('');
  const noPlayers=Object.keys(PART).length===0;
  $('app').innerHTML=`<div class="wrap">
    <div class="logo"><div class="ball">⚽</div><h1>Liga Typera</h1><p>JYSK</p></div>
    <div class="card">
      <h3 style="font-size:18px">Logowanie</h3>
      ${noPlayers?`<p class="muted">Admin nie dodał jeszcze uczestników. Wróć za chwilę.</p>`:`
      <label>Wybierz siebie</label>
      <select id="who">${opts}</select>
      <label>Twoje hasło</label>
      <input id="pw" type="password" placeholder="hasło" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="primary" onclick="doLogin()">Wejdź</button>
      ${errLogin?`<div class="err">${esc(errLogin)}</div>`:''}`}
    </div>
    <div class="card center" style="background:#16201A;color:#CFD5CE">
      <span class="muted" style="color:#9AA199">Jesteś organizatorem?</span><br>
      <button class="icon-btn" style="margin-top:8px" onclick="askAdmin()">Panel administratora</button>
    </div></div>`;
}
function doLogin(){
  const pid=$('who').value, pw=$('pw').value;
  if(PART[pid]&&String(PART[pid].password)===pw){errLogin='';ME=pid;localStorage.setItem('typer_jysk_pid',pid);render();}
  else{errLogin='Niepoprawne hasło.';render();}
}
function askAdmin(){
  const v=prompt('Hasło administratora:'); if(v==null)return;
  if(String(CFG.adminPassword)===v){ADMIN=true;sessionStorage.setItem('typer_jysk_admin','1');render();}
  else alert('Niepoprawne hasło administratora.');
}
function logout(){ME=null;localStorage.removeItem('typer_jysk_pid');render();}

/* ---------- Main (participant) ---------- */
function tabbar(){
  $('tabs').innerHTML=`<div class="tabbar">
    <button class="${TAB==='mecze'?'on':''}" onclick="go('mecze')"><span class="dot">⚽</span>Mecze</button>
    <button class="${TAB==='rozegrane'?'on':''}" onclick="go('rozegrane')"><span class="dot">✅</span>Rozegrane</button>
    <button class="${TAB==='tabela'?'on':''}" onclick="go('tabela')"><span class="dot">🏆</span>Tabela</button>
  </div>`;
}
function go(t){TAB=t;render();}

function renderMain(){
  const me=PART[ME];
  const ex=`<div style="text-align:right"><div style="font-family:Oswald;font-weight:600;font-size:14px">${esc(me.name)}</div>
    <button class="icon-btn" style="margin-top:4px;padding:4px 8px" onclick="logout()">Wyloguj</button></div>`;
  let body = TAB==='tabela' ? viewTable() : (TAB==='rozegrane' ? viewDone() : viewMatches());
  $('app').innerHTML=header(ex)+`<div class="wrap">${body}<div class="foot">Kursy to szacunek na podstawie siły drużyn — nie zakłady.<br>1 pkt = dokładny wynik meczu.</div></div>`;
  tabbar();
}

function viewMatches(){
  const list=sortedMatches();
  if(!list.length)return `<div class="card center muted">Brak meczów. Admin je wkrótce doda.</div>`;
  const open=list.filter(m=>statusOf(m)==='open');
  const live=list.filter(m=>statusOf(m)==='live');
  let h='';
  if(open.length){h+=`<div class="sec-h">Do wytypowania</div>`+open.map(matchCard).join('');}
  if(live.length){h+=`<div class="sec-h">W trakcie / czeka na wynik</div>`+live.map(matchCard).join('');}
  if(!h)h=`<div class="card center muted">Brak meczów do typowania.<br>Rozegrane mecze znajdziesz w zakładce „Rozegrane".</div>`;
  return h;
}
function viewDone(){
  const done=sortedMatches().filter(m=>statusOf(m)==='done').reverse();
  if(!done.length)return `<div class="card center muted">Nie ma jeszcze meczów z wpisanym wynikiem.</div>`;
  return `<div class="sec-h">Rozegrane</div>`+done.map(matchCard).join('');
}

function matchCard(m){
  const st=statusOf(m), H=team(m.home), A=team(m.away);
  const showAll = CFG.showBeforeKickoff || st!=='open';
  const od=matchOdds(m);
  let oddsHtml;
  if(od.three){
    const mx=Math.max(od.h,od.d,od.a);
    oddsHtml=`<div class="odds">
      <div class="o ${od.h===mx?'fav':''}"><b>${od.h}%</b><span>${esc(H.pl)}</span></div>
      <div class="o ${od.d===mx?'fav':''}"><b>${od.d}%</b><span>REMIS</span></div>
      <div class="o ${od.a===mx?'fav':''}"><b>${od.a}%</b><span>${esc(A.pl)}</span></div></div>`;
  }else{
    oddsHtml=`<div class="odds">
      <div class="o ${od.h>=od.a?'fav':''}"><b>${od.h}%</b><span>${esc(H.pl)}</span></div>
      <div class="o ${od.a>od.h?'fav':''}"><b>${od.a}%</b><span>${esc(A.pl)}</span></div></div>`;
  }
  const sc = m.done ? `<div class="score">${m.hs}</div><div class="vs">:</div><div class="score">${m.as}</div>`
                    : `<div class="vs" style="font-size:16px">vs</div>`;
  const pill = st==='open'?`<span class="pill open">OTWARTY</span>`: st==='live'?`<span class="pill live">TRWA</span>`:`<span class="pill done">KONIEC</span>`;
  // my pick area
  const myPred = PRED[m.id]&&PRED[m.id][ME];
  let pickArea='';
  if(st==='open'){
    if(myPred){pickArea=`<div class="mypick"><div class="saved">Twój typ: <b>${myPred.h} : ${myPred.a}</b> · zapisany 🔒</div></div>`;}
    else{pickArea=`<div class="mypick"><div class="pickrow">
      <input id="h_${m.id}" type="number" min="0" max="20" inputmode="numeric" placeholder="0">
      <span class="vs">:</span>
      <input id="a_${m.id}" type="number" min="0" max="20" inputmode="numeric" placeholder="0"></div>
      <button class="primary" style="margin-top:10px" onclick="savePick('${m.id}')">Zapisz typ</button>
      <div class="hint center">Po zapisaniu nie zmienisz typu. Zamykamy o ${fmt(m.kickoff)}.</div></div>`;}
  }else if(!myPred){
    pickArea=`<div class="mypick"><div class="locked">Nie wytypowałeś tego meczu.</div></div>`;
  }
  // everyone's picks
  let picksHtml='';
  if(showAll){
    const rows=Object.entries(PART).map(([pid,p])=>{
      const pr=PRED[m.id]&&PRED[m.id][pid];
      const hit=m.done&&pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as);
      const val=pr?`<span class="pv ${m.done&&!hit?'miss':''}">${pr.h}:${pr.a}</span>`:`<span class="pv miss">—</span>`;
      return `<div class="prow ${hit?'hit':''}"><span class="nm">${esc(p.name)}</span>${val}</div>`;
    }).join('');
    picksHtml=`<div class="picks"><h4>Typy wszystkich</h4>${rows}</div>`;
  }else{
    picksHtml=`<div class="picks"><h4>Typy wszystkich</h4><div class="muted" style="font-size:13px">Widoczne po pierwszym gwizdku.</div></div>`;
  }
  return `<div class="match">
    <div class="m-top"><span class="stage">${esc(m.stage||'')}</span><span>${fmt(m.kickoff)} ${pill}</span></div>
    <div class="teams">
      <div class="team"><span class="flag">${H.f}</span><span class="tname">${esc(H.pl)}</span></div>
      ${sc}
      <div class="team away"><span class="tname">${esc(A.pl)}</span><span class="flag">${A.f}</span></div>
    </div>
    ${oddsHtml}${pickArea}${picksHtml}</div>`;
}

function savePick(mid){
  const h=$('h_'+mid).value, a=$('a_'+mid).value;
  if(h===''||a===''){alert('Wpisz oba wyniki.');return;}
  const hh=parseInt(h,10), aa=parseInt(a,10);
  if(isNaN(hh)||isNaN(aa)||hh<0||aa<0){alert('Wynik musi być liczbą ≥ 0.');return;}
  const m=MATCH[mid]; const H=team(m.home).pl, A=team(m.away).pl;
  if(!confirm(`Zapisać typ ${H} ${hh} : ${aa} ${A}?\nPo zapisaniu NIE da się go już zmienić.`))return;
  db.ref('predictions/'+mid+'/'+ME).set({h:hh,a:aa,ts:Date.now()})
    .catch(e=>{ alert('Nie zapisano. Mecz mógł się już rozpocząć.'); });
}

function viewTable(){
  const s=standings();
  if(!s.length)return `<div class="card center muted">Brak uczestników.</div>`;
  const rows=s.map((r,i)=>`
    <div class="lb-row ${i===0?'lead':''}">
      <div class="rank">${i+1}</div>
      <div class="lb-name">${i===0?'<span class="crown">👑</span> ':''}${esc(r.name)}
        <div class="lb-sub">start ${r.start} · trafienia ${r.correct}</div></div>
      <div class="pts">${r.total}<small>PKT</small></div>
    </div>`).join('');
  return `<div class="sec-h">Klasyfikacja</div><div class="lb">${rows}</div>
    <div class="hint center">Punkty = startowe + 1 za każdy dokładnie trafiony wynik.</div>`;
}

/* ---------- Admin ---------- */
function renderAdmin(){
  $('tabs').innerHTML='';
  const ex=`<button class="icon-btn" onclick="exitAdmin()">Wyjdź z panelu</button>`;
  const plist=Object.entries(PART).map(([pid,p])=>`
    <div class="listitem">
      <div class="g"><b>${esc(p.name)}</b><div class="muted">hasło: ${esc(p.password)} · start: <input style="width:64px;display:inline-block;padding:5px" type="number" id="st_${pid}" value="${Number(p.start||0)}"> <button class="icon-btn mini" onclick="saveStart('${pid}')">Zapisz</button></div></div>
      <button class="danger" onclick="delPart('${pid}')">Usuń</button>
    </div>`).join('') || `<div class="muted">Brak uczestników — dodaj 8 osób poniżej.</div>`;

  const teamOpts=Object.keys(TEAMS).sort((a,b)=>team(a).pl.localeCompare(team(b).pl,'pl'))
    .map(c=>`<option value="${c}">${team(c).pl}</option>`).join('');

  const mlist=sortedMatches().map(m=>{
    const H=team(m.home).pl,A=team(m.away).pl,st=statusOf(m);
    return `<div class="listitem">
      <div class="g"><b>${esc(H)} – ${esc(A)}</b>
        <div class="muted">${esc(m.stage||'')} · ${fmt(m.kickoff)} ${m.done?`· <b>${m.hs}:${m.as}</b>`:`· <span class="tag">${st==='open'?'otwarty':'czeka na wynik'}</span>`}</div>
        <div class="row2" style="margin-top:6px;max-width:230px">
          <input type="number" id="rh_${m.id}" placeholder="dom" value="${m.done?m.hs:''}" style="padding:6px">
          <input type="number" id="ra_${m.id}" placeholder="goś" value="${m.done?m.as:''}" style="padding:6px">
          <button class="icon-btn mini" onclick="saveResult('${m.id}')">Wynik</button>
        </div></div>
      <button class="danger" onclick="delMatch('${m.id}')">Usuń</button>
    </div>`;}).join('');

  $('app').innerHTML=header(ex)+`<div class="wrap">
    <div class="sec-h">Uczestnicy (${Object.keys(PART).length})</div>
    <div class="card">${plist}
      <div style="border-top:1px solid var(--line);margin-top:10px;padding-top:10px">
        <label>Dodaj uczestnika</label>
        <input id="np_name" placeholder="Imię">
        <div class="row2" style="margin-top:8px">
          <input id="np_pw" placeholder="Hasło">
          <input id="np_st" type="number" placeholder="Pkt startowe" value="0">
        </div>
        <button class="primary" onclick="addPart()">Dodaj</button>
      </div>
    </div>

    <div class="sec-h">Mecze i wyniki</div>
    <div class="card">
      <button class="primary" style="margin-top:0" onclick="importKnock()">Wgraj potwierdzone mecze 1/16 (10 par)</button>
      <div class="hint" style="margin-bottom:10px">Dodaje 10 pewnych par 1/16. Brakuje jeszcze 2 (rywale Szwajcarii i Australii) — dorobię je, gdy potwierdzisz. Klikniesz dwa razy — nie zrobi duplikatów.</div>
      ${mlist||'<div class="muted">Brak meczów.</div>'}
      <div style="border-top:1px solid var(--line);margin-top:10px;padding-top:10px">
        <label>Dodaj mecz (np. kolejna runda pucharów)</label>
        <div class="row2"><select id="nm_h">${teamOpts}</select><select id="nm_a">${teamOpts}</select></div>
        <label>Data i godzina (czas polski)</label>
        <input id="nm_dt" type="datetime-local">
        <label>Etap</label>
        <input id="nm_stage" value="1/16 finału">
        <button class="primary" onclick="addMatch()">Dodaj mecz</button>
        <div class="hint">Kurs policzy się sam z siły drużyn. Wynik wpiszesz po meczu.</div>
      </div>
    </div>

    <div class="sec-h">Ustawienia</div>
    <div class="card">
      <div class="switch"><span class="lbl">Pokazuj cudze typy przed pierwszym gwizdkiem</span>
        <div class="tg ${CFG.showBeforeKickoff?'on':''}" onclick="toggleShow()"></div></div>
      <div class="hint">Włączone = pełna transparentność (każdy widzi wszystkie typy od razu). Wyłączone = cudze typy widać dopiero po rozpoczęciu meczu (nikt nikogo nie przepisze).</div>
      <label style="margin-top:14px">Nazwa ligi</label>
      <div class="row2"><input id="lname" value="${esc(CFG.leagueName||'LIGA TYPERA JYSK')}"><button class="icon-btn" onclick="saveName()">Zapisz</button></div>
      <label style="margin-top:14px">Zmień hasło administratora</label>
      <div class="row2"><input id="newadm" type="password" placeholder="nowe hasło"><button class="icon-btn" onclick="changeAdm()">Zmień</button></div>
    </div>
    <div class="foot">Panel widoczny tylko dla Ciebie. Uczestnicy logują się swoim hasłem.</div>
  </div>`;
}
function exitAdmin(){ADMIN=false;sessionStorage.removeItem('typer_jysk_admin');render();}
function addPart(){
  const name=$('np_name').value.trim(),pw=$('np_pw').value.trim(),st=parseInt($('np_st').value||'0',10)||0;
  if(!name||!pw){alert('Podaj imię i hasło.');return;}
  db.ref('participants').push({name,password:pw,start:st});
}
function saveStart(pid){const v=parseInt($('st_'+pid).value||'0',10)||0;db.ref('participants/'+pid+'/start').set(v).then(()=>flash('Zapisano'));}
function delPart(pid){if(confirm('Usunąć uczestnika '+PART[pid].name+'?'))db.ref('participants/'+pid).remove();}
function saveResult(mid){
  const h=$('rh_'+mid).value,a=$('ra_'+mid).value;
  if(h===''||a===''){alert('Wpisz oba wyniki.');return;}
  db.ref('matches/'+mid).update({hs:parseInt(h,10),as:parseInt(a,10),done:true}).then(()=>flash('Wynik zapisany'));
}
function delMatch(mid){if(confirm('Usunąć mecz?')){db.ref('matches/'+mid).remove();db.ref('predictions/'+mid).remove();}}
function addMatch(){
  const h=$('nm_h').value,a=$('nm_a').value,dt=$('nm_dt').value,stage=$('nm_stage').value.trim();
  if(h===a){alert('Wybierz dwie różne drużyny.');return;}
  if(!dt){alert('Podaj datę i godzinę.');return;}
  const k=new Date(dt).getTime();
  db.ref('matches').push({home:h,away:a,kickoff:k,stage:stage||'Mecz'}).then(()=>{$('nm_dt').value='';flash('Mecz dodany');});
}
function importKnock(){
  if(!confirm('Dodać 6 potwierdzonych meczów 1/16 finału?\nIstniejące mecze, typy i wyniki zostają nietknięte.'))return;
  const up={};
  KNOCK.forEach(m=>{up['matches/'+m.id]={home:m.home,away:m.away,kickoff:new Date(m.iso).getTime(),stage:m.stage};});
  db.ref().update(up).then(()=>flash('Dodano mecze 1/16')).catch(()=>alert('Nie udało się dodać — sprawdź internet.'));
}
function toggleShow(){db.ref('config/showBeforeKickoff').set(!CFG.showBeforeKickoff);}
function saveName(){db.ref('config/leagueName').set($('lname').value.trim()||'LIGA TYPERA JYSK').then(()=>flash('Zapisano'));}
function changeAdm(){const v=$('newadm').value.trim();if(v.length<4){alert('Min. 4 znaki.');return;}db.ref('config/adminPassword').set(v).then(()=>flash('Hasło zmienione'));}
function flash(t){const d=document.createElement('div');d.textContent=t;d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2E9E5B;color:#fff;padding:10px 18px;border-radius:20px;font-weight:600;z-index:99;font-size:14px';document.body.appendChild(d);setTimeout(()=>d.remove(),1500);}
</script>
</body>
</html>
