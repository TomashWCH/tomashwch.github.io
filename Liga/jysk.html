    </div>`;
    document.body.appendChild(ov); return;
  }

  let w=0,d=0,l=0,gf=0,ga=0;
  const rows=played.map(m=>{
    const isHome=m.home===code;
    const opp=isHome?m.away:m.home;
    const myG=isHome?Number(m.hs):Number(m.as);
    const opG=isHome?Number(m.as):Number(m.hs);
    gf+=myG; ga+=opG;
    let res, cls;
    if(myG>opG){res='W';cls='win';w++;}
    else if(myG<opG){res='P';cls='lose';l++;}
    else{res='R';cls='draw';d++;}

    // collect tips for this match
    const tipRows=Object.entries(PRED[m.id]||{}).map(([pid,pr])=>{
      if(!PART[pid])return '';
      const hit=Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as);
      return `${esc(PART[pid].name)}: ${pr.h}:${pr.a}${hit?' ✓':''}`;
    }).filter(Boolean).join(' · ');

    return `<div class="team-hist-row">
      <div>
        <div style="font-size:10px;color:var(--muted)">${esc(m.stage||'')} · ${fmt(m.kickoff)}</div>
        <div class="team-hist-opp">${isHome?'vs':'@'} ${esc(team(opp).f)} ${esc(team(opp).pl)}</div>
        ${tipRows?`<div class="team-hist-tips">Typy: ${tipRows}</div>`:''}
      </div>
      <div style="text-align:right">
        <div class="team-hist-score ${cls}">${myG}:${opG}</div>
        <div style="font-size:11px;color:var(--muted)">${res}</div>
      </div>
    </div>`;
  }).join('');

  const ov=document.createElement('div');
  ov.className='ovl'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet">
    <button class="x" onclick="this.closest('.ovl').remove()">Zamknij</button>
    <span class="team-hist-flag">${t.f}</span>
    <div class="team-hist-name">${esc(t.pl)}</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">
      <div class="box" style="background:#EAF4EE;padding:8px 14px;border-radius:10px;text-align:center"><b style="font-family:Oswald;font-size:20px;color:var(--green)">${w}</b><div style="font-size:10px;color:var(--muted)">WYGRANE</div></div>
      <div class="box" style="background:#F4F1E8;padding:8px 14px;border-radius:10px;text-align:center"><b style="font-family:Oswald;font-size:20px">${d}</b><div style="font-size:10px;color:var(--muted)">REMISY</div></div>
      <div class="box" style="background:#FBE9E7;padding:8px 14px;border-radius:10px;text-align:center"><b style="font-family:Oswald;font-size:20px;color:var(--red)">${l}</b><div style="font-size:10px;color:var(--muted)">PORAŻKI</div></div>
      <div class="box" style="background:#F4F1E8;padding:8px 14px;border-radius:10px;text-align:center"><b style="font-family:Oswald;font-size:20px">${gf}:${ga}</b><div style="font-size:10px;color:var(--muted)">BRAMKI</div></div>
    </div>
    <div class="team-hist-list">${rows}</div>
  </div>`;
  document.body.appendChild(ov);
}

function showHistory(){

  });
  const allTimeRows=Object.values(allTime).sort((a,b)=>b.total-a.total||b.wins-a.wins||a.name.localeCompare(b.name,'pl'));
  const allTimeHtml=allTimeRows.length?`<div class="lb">${allTimeRows.map((r,i)=>`
    <div class="lb-row ${i===0?'lead':''}">
      <div class="rank">${i+1}</div>
      <div class="lb-name">${i===0?'<span class="crown">👑</span> ':''}<b>${esc(r.name)}</b>${r.wins?` <span style="font-size:13px">${'🏆'.repeat(Math.min(r.wins,3))}</span>`:''}
        <div class="lb-sub">${r.tournaments} ${r.tournaments===1?'turniej':'turnieje(ów)'} rozegrane</div></div>
      <div class="pts">${r.total}<small>PKT</small></div>
    </div>`).join('')}</div>`:`<div class="muted center" style="padding:14px 0">Ranking wszech czasów pojawi się po zarchiwizowaniu pierwszego turnieju.</div>`;
  const archivesHtml=archives.length?archives.map(arc=>{
    const sc=(arc.standingsClassic||[]).slice().sort((a,b)=>b.total-a.total);
    const medals=['🥇','🥈','🥉'];
    const podium=sc.slice(0,3).map((r,i)=>`<div class="prow"><span class="nm">${medals[i]} ${esc(r.name)}</span><span class="muted">${r.total} pkt</span></div>`).join('');
    const fullRows=sc.map((r,i)=>`<div class="prow"><span class="nm">${i+1}. ${esc(r.name)}</span><span class="muted">${r.total} pkt</span></div>`).join('');
    const date=new Date(arc.archivedAt).toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'});
    return `<div class="card" style="margin:10px 0;padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <b style="font-family:Oswald">${esc(arc.name)}</b><span class="muted" style="font-size:11px">${date}</span>
      </div>
      ${podium}
      <button class="icon-btn" style="width:100%;margin-top:8px" onclick="const e=this.nextElementSibling;const open=e.style.display==='block';e.style.display=open?'none':'block';this.textContent=open?'Pokaż pełną klasyfikację ⌄':'Ukryj ⌃';">Pokaż pełną klasyfikację ⌄</button>
      <div style="display:none;margin-top:6px">${fullRows}</div>
    </div>`;
  }).join(''):`<div class="muted center" style="padding:14px 0">Jeszcze żaden turniej nie został zarchiwizowany.<br>Gdy admin zakończy sezon, pojawi się tu na stałe.</div>`;
  // 🏛️ Rekordy wszech czasów
  let recPts=null,recExact=null,recBadges=null;const champHits=[];
  archives.forEach(arc=>{
    (arc.standingsClassic||[]).forEach(r=>{
      if(!recPts||r.total>recPts.v)recPts={v:r.total,name:r.name,t:arc.name};
      const ex=Number(r.correct||0);
      if(!recExact||ex>recExact.v)recExact={v:ex,name:r.name,t:arc.name};
    });
    Object.entries(arc.badges||{}).forEach(([pid,bb])=>{
      const n=(bb||[]).length,nm=arc.participants&&arc.participants[pid]&&arc.participants[pid].name;
      if(nm&&(!recBadges||n>recBadges.v))recBadges={v:n,name:nm,t:arc.name};
    });
    if(arc.champion&&arc.champPicks){
      Object.entries(arc.champPicks).forEach(([pid,c])=>{
        if(c===arc.champion){const nm=arc.participants&&arc.participants[pid]&&arc.participants[pid].name;
          if(nm)champHits.push(nm+' ('+team(arc.champion).pl+', '+arc.name+')');}
      });
    }
  });
  const recRow=(e,t,r)=>r?`<div class="prow"><span class="nm">${e} ${t}</span><span class="muted" style="font-size:12px;text-align:right"><b>${esc(r.name)}</b> — ${r.v}<br>${esc(r.t)}</span></div>`:'';
  const recordsHtml=(recPts||recExact||recBadges||champHits.length)?`<div class="card" style="padding:14px">
    ${recRow('🏔️','Najwięcej pkt w edycji',recPts)}
    ${recRow('🎯','Najwięcej dokładnych w edycji',recExact)}
    ${recRow('🎖️','Najwięcej odznak w edycji',recBadges)}
    ${champHits.length?`<div class="prow"><span class="nm">🏆 Trafiony mistrz turnieju</span><span class="muted" style="font-size:12px;text-align:right">${champHits.map(esc).join('<br>')}</span></div>`:''}
  </div>`:'';
  const ov=document.createElement('div');
  ov.className='ovl'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet">
    <button class="x" onclick="this.closest('.ovl').remove()">Zamknij</button>
    <div class="sec-h" style="margin-top:0">🏆 Ranking wszech czasów</div>
    ${allTimeHtml}
    ${recordsHtml?`<div class="sec-h">🏛️ Rekordy wszech czasów</div>${recordsHtml}`:''}
    <div class="sec-h">Archiwum turniejów</div>
    ${archivesHtml}
  </div>`;
  document.body.appendChild(ov);
}
window.showHistory=showHistory;
function showPodium(){
  const s=standings();
  if(!s.length)return;
  const medals=['🥇','🥈','🥉'];
  const emojis=['🏆','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
  const top3=s.slice(0,3);
  const rest=s.slice(3);
  // Podium layout: 2nd, 1st, 3rd
  const order=[top3[1],top3[0],top3[2]].filter(Boolean);
  const heights=['p2','p1','p3'];
  const ordH=['p2','p1','p3'];
  const nums=['🥈','🥇','🥉'];

  const podiumCols=order.map((r,i)=>{
    const cls=ordH[i];
    const medal=nums[i];
    return `<div class="podium-col">
      <div class="podium-avatar">${medals[s.indexOf(r)]||emojis[s.indexOf(r)]||'⚽'}</div>
      <div class="podium-pname">${esc(r.name)}</div>
      <div class="podium-pts">${r.total} pkt</div>
      <div class="podium-plinth ${cls}">${medal}</div>
    </div>`;
  }).join('');

  const restRows=rest.map((r,i)=>`
    <div class="podium-rest-row">
      <div class="podium-rest-rank">${i+4}.</div>
      <div class="podium-rest-name">${esc(r.name)}</div>
      <div class="podium-rest-pts">${r.total}<span style="font-size:11px;color:#6A7268"> pkt</span></div>
    </div>`).join('');

  const totalDone=Object.values(MATCH).filter(m=>m.done).length;
  const topPred=s[0];
  const topExact=topPred?topPred.correct:0;

  const ov=document.createElement('div');
  ov.className='podium-ovl';
  ov.id='podiumScreen';
  ov.innerHTML=`
    <div class="podium-title">🏆 LIGA TYPERA</div>
    <div class="podium-sub">FINAŁ · MŚ 2026 · JYSK JYSK</div>
    <div style="font-size:36px;margin-bottom:16px;animation:confettiBounce .6s ease-in-out infinite alternate">🎉</div>

    <div class="podium-stage">${podiumCols}</div>

    ${rest.length?`<div class="podium-rest">${restRows}</div>`:''}

    <div style="background:rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;width:100%;max-width:420px;margin-bottom:20px">
      <div style="font-family:Oswald;font-size:13px;letter-spacing:1px;color:#9AA199;margin-bottom:8px">STATYSTYKI TURNIEJU</div>
      <div style="font-size:14px;color:#CFD5CC;line-height:1.8">
        🎯 Rozegrano meczów: <b>${totalDone}</b><br>
        🏅 Zwycięzca ligi: <b>${esc(s[0]&&s[0].name||'—')}</b> z <b>${s[0]&&s[0].total||0} pkt</b><br>
        ⚡ Dokładnych trafień: <b>${topExact}</b>
      </div>
    </div>

    <button class="podium-close-btn" onclick="closePodium()">Zamknij podium</button>

    <style>@keyframes confettiBounce{from{transform:scale(1)}to{transform:scale(1.15)}}</style>
  `;
  document.body.appendChild(ov);
}

function closePodium(){const p=document.getElementById('podiumScreen');if(p)p.remove();}
window.closePodium=closePodium;
window.showPodium=showPodium;
</script>
</body>
</html>
