<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1511">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Typer JYSK">
<title>LIGA TYPERA JYSK</title>
<link id="mf" rel="manifest" href="manifest-jysk.json">
<link rel="apple-touch-icon" href="icon-jysk-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1511; --bg2:#16201A; --card:#FBFAF6; --ink:#1A201C; --muted:#6F756E;
    --line:#E6E2D8; --gold:#E8B23A; --gold-d:#B9871F; --green:#2E9E5B; --red:#C2533B;
    --chip:#EFECE3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:#F2F0EA;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-text-size-adjust:100%}
  body{padding:0 0 90px;max-width:560px;margin:0 auto;min-height:100vh}
  .wrap{padding:0 14px}
  h1,h2,h3{font-family:Oswald,sans-serif;margin:0;letter-spacing:.5px}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0F1511,#0F1511 70%,rgba(15,21,17,0));
    padding:14px 14px 10px;display:flex;align-items:center;gap:10px}
  .badge{font-family:Oswald;font-weight:700;font-size:13px;color:#0F1511;background:var(--gold);
    padding:3px 8px;border-radius:6px;line-height:1.1}
  .ttl{font-size:20px;font-weight:700;text-transform:uppercase;line-height:1}
  .ttl small{display:block;font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:500}
  .spacer{flex:1}
  .icon-btn{background:transparent;border:1px solid #2C382F;color:#CDD3CC;border-radius:8px;
    padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer}
  .icon-btn:active{transform:scale(.97)}
  .card{background:var(--card);color:var(--ink);border-radius:14px;padding:16px;margin:12px 0;
    box-shadow:0 1px 0 rgba(0,0,0,.04)}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px}
  input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold)}
  button.primary{width:100%;padding:13px;border:0;border-radius:11px;background:var(--gold);
    color:#241a05;font-family:Oswald;font-weight:700;font-size:16px;letter-spacing:.5px;
    text-transform:uppercase;cursor:pointer;margin-top:14px}
  button.primary:active{transform:scale(.99)}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .muted{color:var(--muted);font-size:13px}
  .err{color:var(--red);font-size:13px;margin-top:8px;font-weight:500}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}

  /* tabs */
  .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    background:#101712;border-top:1px solid #25302A;display:flex;z-index:30}
  .tabbar button{flex:1;background:transparent;border:0;color:#8A918A;padding:10px 0 13px;
    font-family:Oswald;font-weight:600;font-size:11px;letter-spacing:.2px;cursor:pointer;text-transform:uppercase}
  .tabbar button.on{color:var(--gold)}
  .tabbar .dot{display:block;font-size:18px;margin-bottom:2px}

  /* match */
  .match{background:var(--card);color:var(--ink);border-radius:14px;margin:12px 0;overflow:hidden}
  .match.final-match{border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(232,178,58,.18),0 8px 24px rgba(185,135,31,.35);position:relative}
  .match.final-match::before{content:"🏆  WIELKI FINAŁ  🏆";display:block;text-align:center;background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-d));background-size:200% 100%;animation:finalShine 3s linear infinite;color:#241a05;font-family:Oswald;font-weight:700;letter-spacing:3px;font-size:13px;padding:8px 0}
  @keyframes finalShine{0%{background-position:0% 0}100%{background-position:200% 0}}
  .toggle-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .toggle-h .chev{color:var(--gold);font-size:13px;font-weight:600}
  .stage-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;
    padding:10px 2px;border-top:1px solid var(--line);margin-top:6px;color:var(--ink)}
  .stage-hdr b{font-family:Oswald;font-size:12.5px;letter-spacing:.3px}
  .chev-mini{color:var(--gold-d);font-size:11.5px;font-weight:600;white-space:nowrap}
  .admin-mrow-collapsed{cursor:pointer}
  .admin-mrow-collapsed:active{opacity:.7}
  .m-top{display:flex;justify-content:space-between;align-items:center;
    padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted);
    background:#F1EEE5;border-bottom:1px solid var(--line)}
  .stage{text-transform:uppercase}
  .pill{padding:2px 8px;border-radius:20px;font-weight:700;font-size:10px}
  .pill.open{background:#E3F2E9;color:var(--green)}
  .pill.live{background:#FBE9D9;color:var(--red)}
  .pill.done{background:#E9E6DC;color:#5A5F58}
  .teams{display:flex;align-items:center;padding:14px;gap:8px}
  .team{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  .team.away{justify-content:flex-end;text-align:right}
  .flag{font-size:24px;line-height:1}

  /* bracket */
  .brk-scroll{overflow-x:auto;margin:0 -14px;padding:2px 14px 8px;-webkit-overflow-scrolling:touch}
  .brk-wrap{display:flex;gap:10px;width:max-content}
  .brk-col{width:132px;flex:0 0 auto;display:flex;flex-direction:column;gap:8px}
  .brk-col-h{font-family:Oswald;font-weight:600;font-size:10.5px;letter-spacing:.8px;
    color:#9AA199;text-transform:uppercase;text-align:center;padding-bottom:2px}
  .brk-match{background:var(--card);border-radius:10px;padding:7px 8px;cursor:pointer}
  .brk-match.brk-final{background:var(--gold);box-shadow:0 0 0 2px var(--gold-d) inset}
  .brk-team{display:flex;align-items:center;gap:5px;padding:3px 0;color:var(--ink);opacity:.62}
  .brk-team.brk-win{opacity:1;font-weight:700}
  .brk-team .flag{font-size:15px}
  .brk-name{flex:1;font-size:11px;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brk-sc{font-family:Oswald;font-weight:700;font-size:12px;min-width:14px;text-align:right}
  .brk-summary{padding:0}
  .tname{font-family:Oswald;font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{font-family:Oswald;font-weight:700;font-size:30px;min-width:34px;text-align:center;color:#11150F}
  .vs{font-size:12px;color:var(--muted);font-weight:700;padding:0 2px}
  .odds{display:flex;gap:6px;padding:0 14px 12px}
  .odds .o{flex:1;text-align:center;background:#F4F1E8;border-radius:8px;padding:6px 2px}
  .odds .o b{font-family:Oswald;font-size:15px;display:block;color:#11150F}
  .odds .o span{font-size:10px;color:var(--muted);letter-spacing:.5px}
  .odds .o.fav{background:#FBF1D9}
  .mypick{padding:0 14px 14px}
  .pickrow{display:flex;align-items:center;gap:8px;justify-content:center}
  .pickrow input{width:62px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;padding:8px}
  .saved{text-align:center;font-weight:600;background:#EAF4EE;border-radius:10px;padding:9px;color:#246B43;font-size:14px}
  .saved b{font-family:Oswald;font-size:18px}
  .locked{text-align:center;background:#F2EFE6;border-radius:10px;padding:9px;color:var(--muted);font-size:13px}
  .picks{border-top:1px dashed var(--line);margin-top:2px;padding:10px 14px 14px}
  .picks h4{margin:0 0 8px;font-family:Oswald;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px}
  .prow .nm{font-weight:500}
  .prow .pv{font-family:Oswald;font-weight:700;font-size:15px}
  .prow.hit{color:var(--green)}
  .prow.hit .pv::after{content:" ✓";font-size:12px}
  .prow .pv.miss{color:#A8ADA4}

  /* table */
  .lb{background:var(--card);color:var(--ink);border-radius:14px;overflow:hidden;margin:12px 0}
  .lb-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line);gap:12px}
  .lb-row:last-child{border-bottom:0}
  .lb-row.lead{background:linear-gradient(90deg,#FBF1D6,#FBFAF6)}
  .rank{font-family:Oswald;font-weight:700;font-size:18px;width:26px;color:var(--muted)}
  .lb-row.lead .rank{color:var(--gold-d)}
  .lb-name{flex:1;font-weight:600;font-size:16px}
  .lb-sub{font-size:11px;color:var(--muted);font-weight:500}
  .pts{font-family:Oswald;font-weight:700;font-size:24px}
  .pts small{font-size:11px;color:var(--muted);font-weight:500;display:block;text-align:right;letter-spacing:.5px}
  .crown{font-size:16px}

  .sec-h{font-family:Oswald;font-weight:600;font-size:13px;letter-spacing:1.5px;color:#9AA199;
    text-transform:uppercase;margin:20px 4px 2px}
  .row2{display:flex;gap:8px}
  .row2>*{flex:1}
  .mini{font-size:12px;padding:8px 10px}
  .listitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .listitem:last-child{border-bottom:0}
  .listitem .g{flex:1}
  .listitem .g b{font-family:Oswald;font-size:15px}
  .tag{background:var(--chip);border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;color:#555}
  .danger{color:var(--red);background:#fff;border:1px solid #E7C7BF;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:600;cursor:pointer}
  .ok-note{background:#EAF4EE;color:#246B43;border-radius:10px;padding:10px;font-size:13px;font-weight:500;margin-top:8px}
  .center{text-align:center}
  .logo{text-align:center;padding:26px 0 6px}
  .logo .ball{font-size:46px}
  .logo h1{font-size:34px;margin-top:6px;text-transform:uppercase}
  .logo p{letter-spacing:3px;color:var(--gold);font-size:12px;margin:2px 0 0}
  .switch{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .switch .lbl{font-size:13px;font-weight:600;color:var(--ink)}
  .tg{width:48px;height:28px;border-radius:20px;background:#D8D4C8;position:relative;cursor:pointer;flex:none}
  .tg.on{background:var(--green)}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s}
  .tg.on::after{left:23px}
  .foot{text-align:center;color:#4C544C;font-size:11px;padding:20px 0 6px;line-height:1.6}
  /* ---- v2 features ---- */
  .tabbar button{font-size:9.5px;letter-spacing:0;padding:9px 0 12px;position:relative}
  .tabbar .dot{font-size:16px}
  .cd{display:inline-block;font-weight:700;color:var(--gold-d)}
  .mv{font-size:12px;font-weight:700;margin-left:3px}
  .mv.up{color:var(--green)} .mv.dn{color:var(--red)} .mv.eq{color:#B9B5A8}
  .lb-name.clk{cursor:pointer}
  .lb-name.clk b{border-bottom:1px dotted #C7C2B5}
  .ovl{position:fixed;inset:0;background:rgba(8,12,9,.6);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);color:var(--ink);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px 16px 26px;max-height:84vh;overflow:auto}
  .sheet h3{font-size:21px}
  .sheet .x{float:right;border:0;background:#EFECE3;border-radius:8px;padding:6px 11px;font-weight:700;cursor:pointer}
  .stat{display:flex;gap:8px;margin:14px 0 6px}
  .stat .box{flex:1;background:#F4F1E8;border-radius:12px;padding:12px 6px;text-align:center}
  .stat .box b{font-family:Oswald;font-size:24px;display:block;line-height:1}
  .stat .box span{font-size:10.5px;color:var(--muted)}
  .forma{display:flex;gap:6px;margin-top:6px}
  .fd{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
  .fd.e{background:var(--green)} .fd.t{background:var(--gold-d)} .fd.m{background:#C3BFB3}
  .chat{display:flex;flex-direction:column;gap:8px;padding:4px 0 8px}
  .msg{background:var(--card);color:var(--ink);border-radius:13px;padding:9px 12px;max-width:86%}
  .msg.me{align-self:flex-end;background:#FBF1D9}
  .msg .who{font-size:11px;font-weight:700;color:var(--gold-d);margin-bottom:2px}
  .msg .tx{font-size:14px;line-height:1.35;word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-line}
  .msg.bot{background:#FBF6E6;border:1.5px solid var(--gold);max-width:92%}
  .msg.bot .who{color:var(--gold-d);font-size:12px}
  /* ── NOWE v4 ── */
  /* Historia drużyny */
  .team-hist-flag{font-size:32px;display:block;text-align:center;margin-bottom:4px}
  .team-hist-name{font-family:Oswald;font-weight:700;font-size:22px;text-align:center;margin-bottom:14px}
  .team-hist-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .team-hist-row:last-child{border-bottom:0}
  .team-hist-score{font-family:Oswald;font-weight:700;font-size:18px;min-width:52px;text-align:center}
  .team-hist-score.win{color:var(--green)} .team-hist-score.lose{color:var(--red)} .team-hist-score.draw{color:#A8ADA4}
  .team-hist-opp{font-size:14px;font-weight:500;flex:1}
  .team-hist-stage{font-size:11px;color:var(--muted)}
  .team-hist-tips{font-size:12px;color:var(--muted);margin-top:2px}
  /* Podium */
  .podium-ovl{position:fixed;inset:0;z-index:90;background:linear-gradient(160deg,#0a1a0e,#0F1511);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:24px 16px 40px}
  .podium-title{font-family:Oswald;font-weight:700;font-size:30px;letter-spacing:3px;color:var(--gold);text-align:center;margin-bottom:4px;text-transform:uppercase}
  .podium-sub{font-size:12px;color:#9AA199;letter-spacing:2px;text-align:center;margin-bottom:28px}
  .podium-stage{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:24px;width:100%}
  .podium-col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .podium-avatar{font-size:36px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
  .podium-pname{font-family:Oswald;font-weight:700;font-size:15px;text-align:center;color:#F2F0EA;max-width:90px;line-height:1.2}
  .podium-pts{font-family:Oswald;font-weight:700;font-size:13px;color:var(--gold-d)}
  .podium-plinth{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-weight:700;font-size:22px}
  .podium-plinth.p1{width:96px;height:96px;background:linear-gradient(180deg,#e8c53a,#b9871f);color:#fff;box-shadow:0 0 28px rgba(232,178,58,.5)}
  .podium-plinth.p2{width:82px;height:72px;background:linear-gradient(180deg,#b8c0cc,#8a929e);color:#fff}
  .podium-plinth.p3{width:74px;height:52px;background:linear-gradient(180deg,#cc8f5c,#9a6038);color:#fff}
  .podium-rest{width:100%;max-width:420px;background:rgba(255,255,255,.06);border-radius:14px;padding:4px 12px;margin-bottom:20px}
  .podium-rest-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);gap:10px}
  .podium-rest-row:last-child{border-bottom:0}
  .podium-rest-rank{font-family:Oswald;font-weight:700;font-size:18px;color:#6A7268;width:26px;text-align:center}
  .podium-rest-name{flex:1;font-weight:600;color:#CFD5CC;font-size:14px}
  .podium-rest-pts{font-family:Oswald;font-weight:700;font-size:20px;color:var(--gold-d)}
  .podium-close-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#CFD5CC;border-radius:10px;padding:10px 28px;font-family:Oswald;font-weight:600;font-size:15px;cursor:pointer;letter-spacing:1px}
  /* Zdjęcia w czacie */
  .msg-img{max-width:100%;border-radius:10px;margin-top:6px;display:block;cursor:pointer}
  .img-preview{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:95;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .img-preview img{max-width:95vw;max-height:90vh;border-radius:8px}
  /* In-app banery */
  .inapp-banner{position:fixed;top:0;left:0;right:0;max-width:560px;margin:0 auto;z-index:80;
    display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:0 0 14px 14px;
    font-size:13px;font-weight:500;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.4);
    animation:slideDown .35s ease-out}
  .inapp-banner.green{background:#1A4D2E;border-bottom:2px solid var(--green);color:#C8F0D8}
  .inapp-banner.amber{background:#3D2A00;border-bottom:2px solid var(--gold);color:#FFE29A}
  .inapp-banner-ic{font-size:20px;flex:none;margin-top:1px}
  .inapp-banner-body{flex:1}
  .inapp-banner-title{font-family:Oswald;font-weight:700;font-size:15px;letter-spacing:.3px;margin-bottom:2px}
  .inapp-banner-x{flex:none;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;padding:0 0 0 6px;line-height:1}
  @keyframes slideDown{from{transform:translateY(-110%);opacity:0}to{transform:translateY(0);opacity:1}}
  .team-name-clk{cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
  .msg .tm{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
  .chatbar{position:fixed;bottom:52px;left:0;right:0;max-width:560px;margin:0 auto;display:flex;gap:8px;padding:8px 12px;background:#101712;border-top:1px solid #25302A;z-index:25}
  .chatbar input{flex:1;font-size:16px}
  .chatbar button{flex:none;width:54px;border:0;border-radius:10px;background:var(--gold);color:#241a05;font-weight:800;font-size:17px;cursor:pointer}
  textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-family:ui-monospace,Menlo,monospace;font-size:13px;background:#fff;color:var(--ink)}
  textarea:focus{outline:2px solid var(--gold);border-color:var(--gold)}
  /* social */
  .newpill{background:#C2533B;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;margin-left:8px;letter-spacing:0;vertical-align:middle}
  .ndot{position:absolute;top:6px;left:50%;margin-left:7px;width:9px;height:9px;background:#C2533B;border-radius:50%;box-shadow:0 0 0 2px #101712}
  .feed-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .feed-row:last-child{border-bottom:0}
  .feed-ic{font-size:16px;flex:none}
  .feed-tx{font-size:13px;line-height:1.4;flex:1}
  .feed-ago{font-size:10px;color:var(--muted);margin-top:2px}
  .sytu{background:linear-gradient(135deg,#FBF1D9,#FBFAF6)}
  .sytu-h{font-family:Oswald;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-d);margin-bottom:6px}
  .sytu-l{font-size:14px;line-height:1.55}
  .spot{display:flex;gap:12px;align-items:center;padding:12px 16px;margin:10px 0}
  .spot-e{font-size:26px;flex:none}
  .spot-t{font-family:Oswald;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .spot-v{font-size:14px;line-height:1.4}
  .spot-s{font-size:11px;color:var(--muted)}
  .reacts{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;align-items:center}
  .rchip{background:#EFECE3;border-radius:12px;padding:2px 8px;font-size:12px;cursor:pointer}
  .rchip.on{background:#FBE4B0;font-weight:700}
  .rchip.sm{padding:1px 6px;font-size:11px}
  .radd{cursor:pointer;font-size:15px;opacity:.45}

function render(){
  if(!booted)return;
  const ae=document.activeElement;
  if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')){
    const id=(ae&&ae.id)||'';
    if(id.startsWith('h_')||id.startsWith('a_')||id==='chatin'||id.startsWith('mc_')||id==='champsel') return;   // composing
  }
  if(ADMIN && ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')) return;       // admin editing
  // first run: admin password not set
  if(CFG.adminPassword==null && !ADMIN){ renderFirstRun(); return; }
  if(ADMIN){ renderAdmin(); return; }
  if(!ME || !PART[ME]){ renderLogin(); return; }
  renderMain();
}

function updatePushDiag(elId,simple){
  elId=elId||'pushdiag';
  const el=$(elId); if(!el)return;
  if(typeof ONESIGNAL_APP_ID==='undefined'||ONESIGNAL_APP_ID.indexOf('TU_WKLEJ')===0){el.innerHTML='🔕 OneSignal nieskonfigurowany w tym pliku.';return;}
  const swInfo=(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations)?navigator.serviceWorker.getRegistrations():Promise.resolve([]);
  swInfo.then(regs=>{
    const scopes=regs.map(r=>r.scope.replace(location.origin,''))||[];
    const run=(OneSignal)=>{
      try{
        const perm=OneSignal.Notifications&&OneSignal.Notifications.permission;
        const sub=OneSignal.User&&OneSignal.User.PushSubscription;
        const optedIn=!!(sub&&sub.optedIn);
        const id=(sub&&sub.id)||null;
        const linkOk=(function(){try{return localStorage.getItem('typer_link_ok');}catch(e){return null;}})();
        const linkLine=`Powiązanie z kontem (${typeof ME!=='undefined'&&ME?`<code style="font-size:10px">${esc(String(ME))}</code>`:'brak loginu'}): ${linkOk==='1'?'✅ potwierdzone':(linkOk==='0'?'⛔ NIEUDANE — pushe „trafiłeś wynik" Cię ominą':'❔ nieznane (kliknij niżej)')}`;
        if(simple){
          el.innerHTML=`<b>🔔 Powiadomienia (to urządzenie):</b><br>
            Zgoda przeglądarki: ${perm?'✅ jest':((typeof Notification!=='undefined'&&Notification.permission==='denied')?'⛔ zablokowana (kłódka przy adresie → Powiadomienia → Zezwól)':'❌ brak — kliknij dzwonek')}<br>
            Subskrypcja: ${optedIn?'✅ aktywna':'❌ nieaktywna'}<br>
            ${linkLine}
            <br><button class="icon-btn mini" style="margin-top:6px" onclick="relinkAccount()">🔗 Wymuś powiązanie konta</button>
            <br><button class="icon-btn mini" style="margin-top:6px" onclick="updatePushDiag('${elId}',true)">↻ Odśwież status</button>`;
          return;
        }
        el.innerHTML=`<b>🔔 Diagnostyka powiadomień (to urządzenie):</b><br>
          1. Zgoda przeglądarki: ${perm?'✅ jest':((typeof Notification!=='undefined'&&Notification.permission==='denied')?'⛔ ZABLOKOWANA w ustawieniach strony (kłódka obok adresu → Powiadomienia → Zezwól)':'❌ brak — kliknij dzwonek i zezwól')}<br>
          2. Subskrypcja TEJ ligi: ${optedIn?'✅ aktywna':'❌ NIEAKTYWNA'}<br>
          3. ID subskrypcji: ${id?`<code style="font-size:10px">${id}</code>`:'—'}<br>
          4. Service workery: <code style="font-size:10px">${scopes.join(' · ')||'brak'}</code><br>
          5. App ID ligi: <code style="font-size:10px">${ONESIGNAL_APP_ID}</code><br>
          6. ${linkLine}
          <br><button class="icon-btn mini" style="margin-top:6px" onclick="relinkAccount()">🔗 Wymuś powiązanie konta</button>
          ${!optedIn?`<br><button class="icon-btn mini" style="margin-top:6px" onclick="askPush();setTimeout(updatePushDiag,2500)">Włącz teraz i odśwież status</button>`:''}
          <br><button class="icon-btn mini" style="margin-top:6px" onclick="queueTestPush()">🧪 Wyślij testowy push przez automat</button>
          <br><button class="icon-btn mini" style="margin-top:6px" onclick="updatePushDiag()">↻ Odśwież status</button>
          <div id="botrun" style="margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;font-size:12px;color:var(--muted)">⏳ pobieram raport automatu…</div>`;
        db.ref('notify/lastRun').once('value').then(s=>{
          const el2=$('botrun'); if(!el2)return;
          const v=s.val();
          if(!v){el2.innerHTML='🤖 Automat jeszcze nie zostawił raportu w tej lidze (żaden przebieg nie doszedł do zapisu — sprawdź, czy nowy skrypt jest w repo).';return;}
          const ago=Math.round((Date.now()-v.ts)/60000);
          el2.innerHTML=`<b>🤖 Ostatni przebieg automatu:</b> ${ago<1?'przed chwilą':ago+' min temu'}<br><span style="white-space:pre-line">${esc(v.report||'')}</span>`;
        }).catch(()=>{const el2=$('botrun');if(el2)el2.textContent='Nie udało się pobrać raportu automatu.';});
      }catch(e){el.textContent='Błąd odczytu OneSignal: '+((e&&e.message)||e);}
    };
    if(window.OneSignalDeferred){OneSignalDeferred.push(run);}
    else el.innerHTML='❌ SDK OneSignal nie załadował się (blokada skryptów / adblock?).<br>Service workery: '+((scopes.join(' · '))||'brak');
  });
}
async function relinkAccount(){
  if(!window.OneSignalDeferred){flash('Powiadomienia się ładują, spróbuj za chwilę.');return;}
  if(typeof ME==='undefined'||!ME){flash('Zaloguj się najpierw jako uczestnik.');return;}
  OneSignalDeferred.push(async function(OneSignal){
    try{
      await OneSignal.login(String(ME));
      try{ localStorage.setItem('typer_link_ok','1'); }catch(e){}
      flash('Konto powiązane ✅ — trafienia dokładne powinny teraz do Ciebie docierać.');
    }catch(e){
      try{ localStorage.setItem('typer_link_ok','0'); }catch(e2){}
      flash('Powiązanie nieudane: '+((e&&e.message)||e));
    }
    updatePushDiag('pushdiag'); updatePushDiag('pushdiagP',true);
  });
}
function withTimeout(promise,ms,label){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout:'+label)),ms))
  ]);
}
async function askPush(){
  if(ONESIGNAL_APP_ID.indexOf('TU_WKLEJ')===0){flash('Powiadomienia jeszcze nie skonfigurowane przez admina.');return;}
  if(!window.OneSignalDeferred){flash('Powiadomienia się ładują, spróbuj za chwilę.');return;}
  flash('Sprawdzam ustawienia powiadomień…');
  OneSignalDeferred.push(async function(OneSignal){
    try{
      try{
        await withTimeout(OneSignal.Notifications.requestPermission(),8000,'requestPermission');      // nic nie robi, jeśli zgoda już jest
      }catch(e){
        if(String((e&&e.message)||'').indexOf('timeout')===0){
          flash('Przeglądarka nie pokazała okna zgody. Sprawdź małą ikonkę 🔔/🔒 przy adresie strony i kliknij tam „Zezwól", potem odśwież stronę i spróbuj ponownie.');
          return;
        }
        throw e;
      }
      if(!OneSignal.Notifications.permission){
        const st=(typeof Notification!=='undefined')?Notification.permission:'?';
        if(st==='denied')alert('Przeglądarka BLOKUJE powiadomienia dla tej strony.\n\nOdblokuj: stuknij ikonę obok adresu (kłódka/suwaki) → Uprawnienia → Powiadomienia → Zezwól — i kliknij dzwonek ponownie.');
        else flash('Nie wyraziłeś zgody w okienku przeglądarki — kliknij dzwonek i wybierz „Zezwól".');
        return;
      }
      await OneSignal.User.PushSubscription.optIn();          // właściwy zapis do TEJ apki (zgoda to za mało)
      let linkOk=false;
      try{ await OneSignal.login(String(ME)); linkOk=true; }
      catch(e){
        console.warn('OneSignal.login nieudany, ponawiam za 1.5s:',e);
        await new Promise(r=>setTimeout(r,1500));
        try{ await OneSignal.login(String(ME)); linkOk=true; }
        catch(e2){ console.warn('OneSignal.login (2. próba) nieudany:',e2); }
      }
      try{ localStorage.setItem('typer_link_ok', linkOk?'1':'0'); }catch(e){}
      flash(linkOk?'Powiadomienia włączone dla tej ligi 🔔':'Powiadomienia włączone, ale powiązanie z Twoim kontem nie powiodło się — sprawdź diagnostykę i kliknij „Wymuś powiązanie".');
      updatePushDiag('pushdiag'); updatePushDiag('pushdiagP',true);
    }catch(e){
      flash('Błąd powiadomień: '+((e&&e.message)||e));
    }
  });
}

function viewMatches(){
  const list=sortedMatches();
  const home=deadlineBanner()+champCard()+viewSytuacja()+viewReflektor()+viewFeed();
  if(!list.length)return home+`<div class="card center muted">Brak meczów. Admin je wkrótce doda.</div>`;
  const open=list.filter(m=>statusOf(m)==='open');
  const live=list.filter(m=>statusOf(m)==='live');
  let h=home;
  if(open.length){
    h+=`<div class="sec-h">Do wytypowania</div>`;
    if(open.length<=8){ h+=open.map(matchCard).join(''); }
    else{
      const days={}; open.forEach(m=>{const k=dayKey(m.kickoff);(days[k]=days[k]||[]).push(m);});
      const keys=Object.keys(days).sort();
      keys.forEach((k,i)=>{
        const ms=days[k];
        const isOpen=i===0?!DAY_EXP.has(k):DAY_EXP.has(k);   // najbliższy dzień domyślnie otwarty
        h+=`<div class="sec-h toggle-h" style="font-size:13px" onclick="toggleDay('${k}')"><span>📅 ${dayLabel(ms[0].kickoff)} (${ms.length})</span><span class="chev">${isOpen?'zwiń ⌃':'rozwiń ⌄'}</span></div>`;
        if(isOpen)h+=ms.map(matchCard).join('');
      });
    }
  }
  if(live.length){h+=`<div class="sec-h">W trakcie / czeka na wynik</div>`+live.map(matchCard).join('');}
  if(h===home)h+=`<div class="card center muted">Brak meczów do typowania w tej chwili.</div>`;
  return h;
}
function viewDone(){
  const all=sortedMatches();
  const done=all.filter(m=>statusOf(m)==='done');
  if(!done.length)return bracketView()||`<div class="card center muted">Nie ma jeszcze meczów z wpisanym wynikiem.</div>`;
  const notDone=all.filter(m=>statusOf(m)!=='done');
  const currentStage = notDone.length ? notDone[0].stage : done[done.length-1].stage;
  const groups={};
  done.forEach(m=>{ const k=m.stage||'—'; (groups[k]=groups[k]||[]).push(m); });
  const stages=Object.keys(groups).sort((a,b)=> Math.max.apply(null,groups[b].map(m=>m.kickoff)) - Math.max.apply(null,groups[a].map(m=>m.kickoff)));
  let html='';
  stages.forEach(st=>{
    const ms=groups[st].slice().reverse();
    if(st===currentStage){
      html += `<div class="sec-h" style="color:var(--gold)">${esc(st)} · trwa</div>` + ms.map(matchCard).join('');
    } else {
      const open=PHASE_EXP.has(st);
      const key=st.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += `<div class="sec-h toggle-h" onclick="togglePhase('${key}')"><span>${esc(st)} (${ms.length})</span><span class="chev">${open?'zwiń ⌃':'rozwiń ⌄'}</span></div>`;
      if(open) html += ms.map(matchCard).join('');
    }
  });
  return html+bracketView();
}

function matchCard(m){
  const st=statusOf(m), H=team(m.home), A=team(m.away);
  const showAll = CFG.showBeforeKickoff || st!=='open';
  const od=matchOdds(m);
  let oddsHtml;
  if(od.three){
    const mx=Math.max(od.h,od.d,od.a);
    oddsHtml=`<div class="odds">
      <div class="o ${od.h===mx?'fav':''}"><b>${od.h}%</b><span>${esc(H.pl)}</span></div>
      <div class="o ${od.d===mx?'fav':''}"><b>${od.d}%</b><span>REMIS</span></div>
      <div class="o ${od.a===mx?'fav':''}"><b>${od.a}%</b><span>${esc(A.pl)}</span></div></div>`;
  }else{
    oddsHtml=`<div class="odds">
      <div class="o ${od.h>=od.a?'fav':''}"><b>${od.h}%</b><span>${esc(H.pl)}</span></div>
      <div class="o ${od.a>od.h?'fav':''}"><b>${od.a}%</b><span>${esc(A.pl)}</span></div></div>`;
  }
  const sc = m.done ? `<div class="score">${m.hs}</div><div class="vs">:</div><div class="score">${m.as}</div>`
                    : `<div class="vs" style="font-size:16px">vs</div>`;
  const pill = st==='open'?`<span class="pill open">OTWARTY</span>`: st==='live'?`<span class="pill live">TRWA</span>`:`<span class="pill done">KONIEC</span>`;
  // my pick area
  const myPred = PRED[m.id]&&PRED[m.id][ME];
  let pickArea='';
  if(st==='open'){
    if(myPred){pickArea=`<div class="mypick"><div class="saved">Twój typ: <b>${myPred.h} : ${myPred.a}</b>${myPred.j?' <b style="color:var(--gold-d)">⭐×2</b>':''} · zapisany 🔒</div></div>`;}
    else{const jFree=!jokerUsedInStage(m.stage||'Mecz');
      pickArea=`<div class="mypick"><div class="pickrow">
      <input id="h_${m.id}" type="number" min="0" max="20" inputmode="numeric" placeholder="0">
      <span class="vs">:</span>
      <input id="a_${m.id}" type="number" min="0" max="20" inputmode="numeric" placeholder="0"></div>
      ${jFree?`<label class="jkr"><input type="checkbox" id="j_${m.id}"> ⭐ Postaw Jokera — punkty za ten mecz ×2 (jeden na etap, nieodwołalny)</label>`:`<div class="hint center" style="margin-top:6px">⭐ Joker na ten etap już postawiony.</div>`}
      <button class="primary" style="margin-top:10px" onclick="savePick('${m.id}')">Zapisz typ</button>
      <div class="hint center">${(m.stage||'')!=='Faza grupowa'?'Puchar: liczy się wynik po 90 minutach (dogrywka i karne nie liczą się do wyniku).<br>':''}Po zapisaniu nie zmienisz typu. Zamyka się <span class="cd" data-kick="${m.kickoff}">${fmtCountdown(m.kickoff-Date.now())}</span> (${fmt(m.kickoff)}).</div></div>`;}
  }else if(!myPred){
    pickArea=`<div class="mypick"><div class="locked">Nie wytypowałeś tego meczu.</div></div>`;
  }
  // everyone's picks
  let picksHtml='';
  if(showAll){
    const rows=Object.entries(PART).map(([pid,p])=>{
      const pr=PRED[m.id]&&PRED[m.id][pid];
      const hit=m.done&&pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as);
      const val=pr?`<span class="pv ${m.done&&!hit?'miss':''}">${pr.j?'⭐':''}${pr.h}:${pr.a}</span>`:`<span class="pv miss">—</span>`;
      const react=pr?pickReactHtml(m.id,pid):'';
      return `<div class="prow ${hit?'hit':''}"><span class="nm">${esc(p.name)}</span><span style="display:flex;align-items:center;gap:8px">${react}${val}</span></div>`;
    }).join('');
    picksHtml=`<div class="picks"><h4>Typy wszystkich</h4>${rows}${matchComments(m.id)}</div>`;
  }else{
    picksHtml=`<div class="picks"><h4>Typy wszystkich</h4><div class="muted" style="font-size:13px">Widoczne po pierwszym gwizdku.</div>${matchComments(m.id)}</div>`;
  }
  const isFinal=(m.stage||'')==='Finał';
  if(st==='done'){
    const open=EXP.has(m.id);
    const nPicks=Object.keys(PRED[m.id]||{}).length;
    return `<div class="match${isFinal?' final-match':''}">
      <div class="m-top" onclick="toggleExp('${m.id}')" style="cursor:pointer"><span class="stage">${esc(m.stage||'')}</span><span>${fmt(m.kickoff)} ${pill}</span></div>
      <div class="teams" onclick="toggleExp('${m.id}')" style="cursor:pointer">
        <div class="team"><span class="flag" onclick="showTeamHistory('${m.home}')" style="cursor:pointer">${H.f}</span><span class="tname team-name-clk" onclick="showTeamHistory('${m.home}')">${esc(H.pl)}</span></div>
        ${sc}
        <div class="team away"><span class="tname team-name-clk" onclick="showTeamHistory('${m.away}')">${esc(A.pl)}</span><span class="flag" onclick="showTeamHistory('${m.away}')" style="cursor:pointer">${A.f}</span></div>
      </div>
      ${resultNote(m)}
      <div style="text-align:center;padding:0 14px 12px"><button class="icon-btn" style="width:100%" onclick="toggleExp('${m.id}')">${open?'Ukryj typy ⌃':'Pokaż typy ('+nPicks+') ⌄'}</button></div>

function groupTablesView(groupMs){
  const gs={};
  groupMs.forEach(m=>{const g=String(m.grp||'').toUpperCase();if(!/^[A-L]$/.test(g))return;(gs[g]=gs[g]||[]).push(m);});
  const letters=Object.keys(gs).sort();
  if(!letters.length)return '';
  const cards=letters.map(g=>{
    const t={};
    const T=c=>t[c]=t[c]||{c,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    gs[g].forEach(m=>{
      const H=T(m.home),A=T(m.away);
      if(!m.done)return;
      const hs=Number(m.hs),as=Number(m.as);
      H.p++;A.p++;H.gf+=hs;H.ga+=as;A.gf+=as;A.ga+=hs;
      if(hs>as){H.w++;A.l++;H.pts+=3;}
      else if(hs<as){A.w++;H.l++;A.pts+=3;}
      else {H.d++;A.d++;H.pts++;A.pts++;}
    });
    const rows=Object.values(t).sort((x,y)=> y.pts-x.pts || (y.gf-y.ga)-(x.gf-x.ga) || y.gf-x.gf || team(x.c).pl.localeCompare(team(y.c).pl,'pl'));
    const played=gs[g].filter(m=>m.done).length;

    }).join('');
    return `<div class="grp-card"><div class="grp-h"><span>Grupa ${g}</span><small>${played}/${gs[g].length}</small></div>
      <div class="grp-head"><span style="width:12px"></span><span style="width:16px"></span><span class="gname"></span><span class="gnum">M</span><span class="gnum">+/-</span><span class="gpts">Pkt</span></div>

}

function stageChampions(){
  const byStage={};
  sortedMatches().forEach(m=>{const k=m.stage||'Mecz';(byStage[k]=byStage[k]||[]).push(m);});
  const out={};
  Object.entries(byStage).forEach(([st,ms])=>{
    if(!ms.length||!ms.every(m=>m.done))return;
    const sc={};
    ms.forEach(m=>Object.entries(PRED[m.id]||{}).forEach(([pid,pr])=>{
      if(!PART[pid])return;
      const ph=Number(pr.h),pa=Number(pr.a),hs=Number(m.hs),as=Number(m.as);
      sc[pid]=sc[pid]||{pts:0,exact:0};
      if(ph===hs&&pa===as){sc[pid].pts+=3*(pr.j?2:1);sc[pid].exact++;}
      else if(Math.sign(ph-pa)===Math.sign(hs-as))sc[pid].pts+=1*(pr.j?2:1);
    }));
    const arr=Object.entries(sc).filter(([,v])=>v.pts>0);
    if(!arr.length)return;
    const max=Math.max.apply(null,arr.map(([,v])=>v.pts));
    const cand=arr.filter(([,v])=>v.pts===max);
    const maxEx=Math.max.apply(null,cand.map(([,v])=>v.exact));
    out[st]={pids:cand.filter(([,v])=>v.exact===maxEx).map(([pid])=>pid),pts:max,exact:maxEx};
  });
  return out;
}
function roundWinsMap(){
  const sc=stageChampions(); const m={};
  Object.entries(sc).forEach(([st,v])=>v.pids.forEach(pid=>{(m[pid]=m[pid]||[]).push(st);}));
  return m;
}

function kicktippStandings(){
  return Object.entries(PART).map(([pid,p])=>{
    let exact=0, tend=0, pts=0;
    Object.entries(MATCH).forEach(([mid,m])=>{
      if(!m.done)return;
      const pr=PRED[mid]&&PRED[mid][pid];
      if(!pr)return;
      const ph=Number(pr.h),pa=Number(pr.a),hs=Number(m.hs),as=Number(m.as);
      if(ph===hs&&pa===as){exact++;pts+=3*(pr.j?2:1);}
      else if(Math.sign(ph-pa)===Math.sign(hs-as)){tend++;pts+=1*(pr.j?2:1);}
    });
    const start=Number(p.start||0);
    const champPts=(CFG.champion&&CHAMP[pid]===CFG.champion)?champPtsVal():0;
    return {pid,name:p.name,start,exact,tend,champPts,total:start+pts+champPts};
  }).sort((a,b)=> b.total-a.total || b.exact-a.exact || a.name.localeCompare(b.name,'pl'));
}

function exitAdmin(){ADMIN=false;sessionStorage.removeItem('typer_jysk_admin');render();}
function addPart(){
  const name=$('np_name').value.trim(),pw=$('np_pw').value.trim(),st=parseInt($('np_st').value||'0',10)||0;
  if(!name||!pw){alert('Podaj imię i hasło.');return;}
  db.ref('participants').push({name,password:pw,start:st});
}
function saveStart(pid){const v=parseInt($('st_'+pid).value||'0',10)||0;db.ref('participants/'+pid+'/start').set(v).then(()=>flash('Zapisano'));}
function delPart(pid){if(confirm('Usunąć uczestnika '+PART[pid].name+'?'))db.ref('participants/'+pid).remove();}
function saveResult(mid,pref){
  pref=pref||'r';
  const h=$(pref+'h_'+mid).value,a=$(pref+'a_'+mid).value;
  if(h===''||a===''){alert('Wpisz wynik po 90 minutach (górne pola).');return;}
  const hs=parseInt(h,10),as=parseInt(a,10),m=MATCH[mid];
  const ko=(m.stage||'')!=='Faza grupowa';
  const fh=$('fh_'+mid)?$('fh_'+mid).value:'', fa=$('fa_'+mid)?$('fa_'+mid).value:'';
  const haveF= ko && fh!=='' && fa!=='';
  const ph=$('ph_'+mid)?$('ph_'+mid).value:'', pa=$('pa_'+mid)?$('pa_'+mid).value:'';
  const haveP= ko && ph!=='' && pa!=='';
  const adv=$('adv_'+mid)?$('adv_'+mid).value:'';
  const prevC=ranksMap(standings()), prevK=ranksMap(kicktippStandings());
  db.ref('meta').update({prevRanksClassic:prevC,prevRanksKick:prevK});
  db.ref('matches/'+mid).update({hs,as,done:true,rts:Date.now(),
    fhs:haveF?parseInt(fh,10):null, fas:haveF?parseInt(fa,10):null,
    ph:haveP?parseInt(ph,10):null, pa:haveP?parseInt(pa,10):null,
    adv:(ko&&adv)?adv:null, pens:null, aet:null, pen:null}).then(()=>{flash('Wynik zapisany');maybeBotReport(mid,hs,as);queueResultNotify(mid,m,hs,as);});
}
function queueResultNotify(mid,m,hs,as){
  db.ref('notify/pending').push({type:'result', mid, home:m.home, away:m.away, hs, as, ts:Date.now()});
}
function delMatch(mid){if(confirm('Usunąć mecz?')){db.ref('matches/'+mid).remove();db.ref('predictions/'+mid).remove();}}
function addMatch(){
  const h=$('nm_h').value,a=$('nm_a').value,dt=$('nm_dt').value,stage=$('nm_stage').value.trim();
  const grp=($('nm_grp')&&$('nm_grp').value)||'';
  if(h===a){alert('Wybierz dwie różne drużyny.');return;}
  if(!dt){alert('Podaj datę i godzinę.');return;}
  const k=new Date(dt).getTime();
  db.ref('matches').push({home:h,away:a,kickoff:k,stage:stage||'Mecz',grp:(stage==='Faza grupowa'&&grp)?grp:null}).then(()=>{$('nm_dt').value='';flash('Mecz dodany');});
}
function importKnock(){
  if(!confirm('Dodać 6 potwierdzonych meczów 1/16 finału?\nIstniejące mecze, typy i wyniki zostają nietknięte.'))return;
  const up={};
  KNOCK.forEach(m=>{up['matches/'+m.id]={home:m.home,away:m.away,kickoff:new Date(m.iso).getTime(),stage:m.stage};});
  db.ref().update(up).then(()=>flash('Dodano mecze 1/16')).catch(e=>alert(dbErrMsg(e)));
}
function toggleShow(){db.ref('config/showBeforeKickoff').set(!CFG.showBeforeKickoff);}
function saveName(){db.ref('config/leagueName').set($('lname').value.trim()||'LIGA TYPERA JYSK').then(()=>flash('Zapisano'));}
function saveSub(){db.ref('config/subtitle').set($('lsub').value.trim()||'TYPER').then(()=>flash('Zapisano'));}
function saveRulesNote(){db.ref('config/rulesNote').set($('lrules').value.trim()||null).then(()=>flash('Zapisano'));}

function changeAdm(){const v=$('newadm').value.trim();if(v.length<4){alert('Min. 4 znaki.');return;}db.ref('config/adminPassword').set(v).then(()=>flash('Hasło zmienione'));}
function flash(t){const d=document.createElement('div');d.textContent=t;d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2E9E5B;color:#fff;padding:10px 18px;border-radius:20px;font-weight:600;z-index:99;font-size:14px';document.body.appendChild(d);setTimeout(()=>d.remove(),1500);}
function archiveTournament(){
  const name=($('arc_name').value||'').trim()||CFG.leagueName||'Turniej';
  if(!Object.keys(PART).length){alert('Brak uczestników do zarchiwizowania.');return;}
  if(!confirm(`Zarchiwizować „${name}" i wyczyścić planszę pod nowy turniej?\n\nCo się stanie:\n• Wyniki, mecze, typy i czat zostaną zapisane w historii (zakładka Tabela → Historia turniejów)\n• Bieżące mecze, typy i czat zostaną wyczyszczone\n• Lista graczy i hasła zostaną — punkty startowe wyzerują się na nowy start\n\nTej operacji nie da się cofnąć.`))return;
  const snapshot={
    name, archivedAt:Date.now(),
    participants:PART,
    standingsClassic:standings(),
    standingsKicktipp:kicktippStandings(),
    matches:MATCH,
    predictions:PRED,
    champPicks:CHAMP,
    champion:CFG.champion||null,
    badges:Object.fromEntries(Object.keys(PART).map(pid=>[pid,earnedBadges(pid)]))
  };
  db.ref('archive').push(snapshot).then(()=>{
    const up={}; Object.keys(PART).forEach(pid=>{up['participants/'+pid+'/start']=0;});
    return db.ref().update(up);
  }).then(()=>db.ref('matches').remove())
    .then(()=>db.ref('predictions').remove())
    .then(()=>db.ref('chat').remove())
    .then(()=>db.ref('meta').remove())
    .then(()=>db.ref('champ').remove())
    .then(()=>db.ref('config/champion').remove())
    .then(()=>db.ref('config/champDeadline').remove())
    .then(()=>{flash('Turniej zarchiwizowany 🏁');if($('arc_name'))$('arc_name').value='';})
    .catch(e=>alert(dbErrMsg(e)));
}
function startNewEdition(){
  const sub=($('ne_sub')&&$('ne_sub').value.trim())||'';
  const pts=Number(($('ne_pts')&&$('ne_pts').value)||0);
  const dl=($('ne_dl')&&$('ne_dl').value)||'';
  if(!sub){alert('Podaj nazwę nowego turnieju.');return;}

  const m=Math.floor(ms/60000),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>=1)return'za '+d+' d '+(h%24)+' g';

  return'za '+m+' min';
}

/* ---------- v3: Liga Bot — auto-raport po rundzie ---------- */
function buildStageReport(st,MX){
  const ms=Object.entries(MX).map(([id,m])=>({id,...m})).filter(m=>(m.stage||'Mecz')===st&&m.done);
  if(!ms.length)return '';
  const sc={};let exTotal=0;
  ms.forEach(m=>Object.entries(PRED[m.id]||{}).forEach(([pid,pr])=>{
    if(!PART[pid])return;
    const ph=Number(pr.h),pa=Number(pr.a),hs=Number(m.hs),as=Number(m.as);
    sc[pid]=sc[pid]||{pts:0,exact:0};
    if(ph===hs&&pa===as){sc[pid].pts+=3*(pr.j?2:1);sc[pid].exact++;exTotal++;}
    else if(Math.sign(ph-pa)===Math.sign(hs-as))sc[pid].pts+=1*(pr.j?2:1);
  }));
  const arr=Object.entries(sc).sort((a,b)=>b[1].pts-a[1].pts||b[1].exact-a[1].exact);
  const pl_m=(n)=>n===1?'mecz':((n%10>=2&&n%10<=4&&(n%100<12||n%100>14))?'mecze':'meczów');
  let out='📋 RAPORT · '+st.toUpperCase()+' · '+ms.length+' '+pl_m(ms.length)+' rozegrane';
  if(arr.length&&arr[0][1].pts>0){
    const best=arr[0][1];
    const top=arr.filter(([,v])=>v.pts===best.pts&&v.exact===best.exact).map(([pid])=>PART[pid].name);
    out+='\n🥇 MVP rundy: '+top.join(', ')+' — '+best.pts+' pkt Kicktipp ('+best.exact+' dokładn'+(best.exact===1?'e':'ych')+')';
  } else out+='\n🙈 Nikt nie zapunktował w tej rundzie…';
  out+='\n🎯 Dokładne trafienia w rundzie: '+exTotal;
  // lider klasyfikacji klasycznej po tej rundzie
  const totals=Object.entries(PART).map(([pid,p])=>{
    let c=0;Object.entries(MX).forEach(([mid,m])=>{
      if(!m.done)return;const pr=PRED[mid]&&PRED[mid][pid];
      if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))c+=(pr.j?2:1);});
    return {name:p.name,total:Number(p.start||0)+c};
  }).sort((a,b)=>b.total-a.total);
  if(totals.length){
    const lead=totals.filter(t=>t.total===totals[0].total).map(t=>t.name);
    out+='\n👑 Prowadzi: '+lead.join(', ')+' ('+totals[0].total+' pkt)';
  }
  return out;
}

const RESULTS_API='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const API_TEAM={'Algeria':'DZA','Argentina':'ARG','Australia':'AUS','Austria':'AUT','Belgium':'BEL','Bosnia & Herzegovina':'BIH','Brazil':'BRA','Canada':'CAN','Cape Verde':'CPV','Colombia':'COL','Croatia':'CRO','Curaçao':'CUW','Czech Republic':'CZE','DR Congo':'COD','Ecuador':'ECU','Egypt':'EGY','England':'ENG','France':'FRA','Germany':'GER','Ghana':'GHA','Haiti':'HAI','Iran':'IRN','Iraq':'IRQ','Ivory Coast':'CIV','Japan':'JPN','Jordan':'JOR','Mexico':'MEX','Morocco':'MAR','Netherlands':'NED','New Zealand':'NZL','Norway':'NOR','Panama':'PAN','Paraguay':'PAR','Portugal':'POR','Qatar':'QAT','Saudi Arabia':'KSA','Scotland':'SCO','Senegal':'SEN','South Africa':'RSA','South Korea':'KOR','Spain':'ESP','Sweden':'SWE','Switzerland':'SUI','Tunisia':'TUN','Turkey':'TUR','USA':'USA','Uruguay':'URU','Uzbekistan':'UZB'};
async function fetchOnlineResults(){
  const btn=$('fetchres_btn'); if(btn){btn.disabled=true;btn.textContent='⏳ Pobieram…';}
  let data;
  try{
    const r=await fetch(RESULTS_API+'?t='+Math.floor(Date.now()/60000));
    if(!r.ok)throw new Error('HTTP '+r.status);
    data=await r.json();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='🌐 Pobierz wyniki z internetu';}
    alert('Nie udało się pobrać wyników z internetu.\nŹródło (openfootball na GitHubie) nie odpowiada — spróbuj za chwilę albo wpisz wyniki ręcznie.\n\nSzczegóły: '+((e&&e.message)||e));return;
  }
  if(btn){btn.disabled=false;btn.textContent='🌐 Pobierz wyniki z internetu';}
  const ams=(data&&data.matches)||[];
  const usedIds=new Set();const upNew={},upConf={};const touched={};const MX={};
  Object.entries(MATCH).forEach(([id,x])=>{MX[id]=Object.assign({},x);});
  const news=[],confl=[];let sameN=0;
  ams.forEach(am=>{
    const sc=am.score;if(!sc||!sc.ft)return;
    const h=API_TEAM[am.team1],a=API_TEAM[am.team2];
    if(!h||!a)return;   // sloty W97/L101 itd. — mecz jeszcze bez obsady
    const cands=Object.entries(MATCH).filter(([id,mm])=>!usedIds.has(id)&&((mm.home===h&&mm.away===a)||(mm.home===a&&mm.away===h)));
    if(!cands.length)return;
    cands.sort((x,y)=>(x[1].done===y[1].done?0:(x[1].done?1:-1))||x[1].kickoff-y[1].kickoff);
    const mid=cands[0][0],mm=cands[0][1];usedIds.add(mid);
    const sw=mm.home===a;
    const pick=arr=>arr?(sw?[Number(arr[1]),Number(arr[0])]:[Number(arr[0]),Number(arr[1])]):null;
    const ft=pick(sc.ft),et=pick(sc.et),p=pick(sc.p);
    const HS=ft[0],AS=ft[1];
    if(mm.done&&Number(mm.hs)===HS&&Number(mm.as)===AS){sameN++;return;}
    const ko=(mm.stage||'')!=='Faza grupowa';
    let ADV=null;
    if(ko&&HS===AS){
      if(p&&p[0]!==p[1])ADV=p[0]>p[1]?'home':'away';
      else if(et&&et[0]!==et[1])ADV=et[0]>et[1]?'home':'away';
    }
    const u={hs:HS,as:AS,done:true,rts:Date.now(),fhs:ko&&et?et[0]:null,fas:ko&&et?et[1]:null,ph:ko&&p?p[0]:null,pa:ko&&p?p[1]:null,adv:ADV,pens:null,aet:null,pen:null};
    const target=mm.done?upConf:upNew;
    Object.entries(u).forEach(([k,v])=>{target['matches/'+mid+'/'+k]=v;});
    const line='• '+team(mm.home).pl+' '+HS+':'+AS+' '+team(mm.away).pl+(et?' (po dogr. '+et[0]+':'+et[1]+')':'')+(p?' (k. '+p[0]+':'+p[1]+')':'');
    if(mm.done){confl.push(line+'   [w apce: '+mm.hs+':'+mm.as+']');}
    else{news.push(line);MX[mid]=Object.assign({},MX[mid],{hs:HS,as:AS,done:true});touched[mm.stage||'Mecz']=true;}
  });
  if(!news.length&&!confl.length){alert('Wszystko aktualne — internet nie ma nic nowego. ✅'+(sameN?'\nWyników zgodnych z apką: '+sameN:''));return;}
  const doWrite=(up,label)=>{
    const prevC=ranksMap(standings()),prevK=ranksMap(kicktippStandings());
    db.ref('meta').update({prevRanksClassic:prevC,prevRanksKick:prevK});
    return db.ref().update(up).then(()=>flash(label)).catch(e=>alert(dbErrMsg(e)));
  };
  if(news.length&&confirm('🌐 Nowe wyniki z internetu ('+news.length+'):\n\n'+news.join('\n')+'\n\nZapisać? (wynik po 90 min — zgodnie z regulaminem)')){
    doWrite(upNew,'Zapisano '+news.length+' wyników 🌐').then(()=>{
      Object.keys(touched).forEach(st=>botReportIfComplete(st,MX));
    });
  }
  if(confl.length&&confirm('⚠️ Internet podaje INNE wyniki niż wpisane w apce ('+confl.length+'):\n\n'+confl.join('\n')+'\n\nNadpisać wersją z internetu? (jeśli poprawiałeś coś świadomie — wybierz Anuluj)')){
    doWrite(upConf,'Nadpisano '+confl.length+' wyników');
  }
}

}

function compressAvatar(dataUrl, cb, onErr){
  const img=new Image();
  img.onerror=()=>{ if(onErr)onErr(); };
  img.onload=()=>{
    let w=img.width, h=img.height;
    if(!w||!h){ if(onErr)onErr(); return; }
    const side=Math.min(w,h), sx=(w-side)/2, sy=(h-side)/2, out=112;
    const c=document.createElement('canvas'); c.width=out; c.height=out;
    c.getContext('2d').drawImage(img,sx,sy,side,side,0,0,out,out);
    let q=0.85, res=c.toDataURL('image/jpeg',q);
    while(res.length>12*1024*1.37 && q>0.4){ q-=0.1; res=c.toDataURL('image/jpeg',q); }
    cb(res);
  };
  img.src=dataUrl;
}

}

/* ---------- v2: league statistics ---------- */
function leagueStats(){
  const pids=Object.keys(PART);
  const dm=sortedMatches().filter(m=>m.done);
  const exact={},best={},cur={};
  pids.forEach(p=>{exact[p]=0;best[p]=0;cur[p]=0;});
  const perMatch=[];
  dm.forEach(m=>{
    let hits=0;
    pids.forEach(p=>{
      const pr=PRED[m.id]&&PRED[m.id][p];
      if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as)){exact[p]++;cur[p]++;hits++;if(cur[p]>best[p])best[p]=cur[p];}
      else if(pr){cur[p]=0;}
    });
    if(Object.keys(PRED[m.id]||{}).length) perMatch.push({m,hits});
  });
  const sc={}; Object.values(PRED).forEach(o=>Object.values(o).forEach(pr=>{const k=pr.h+':'+pr.a;sc[k]=(sc[k]||0)+1;}));
  let topScore=null,topScoreN=0; Object.entries(sc).forEach(([k,n])=>{if(n>topScoreN){topScoreN=n;topScore=k;}});
  let teP=null,teN=-1; pids.forEach(p=>{if(exact[p]>teN){teN=exact[p];teP=p;}});
  let bsP=null,bsN=0; pids.forEach(p=>{if(best[p]>bsN){bsN=best[p];bsP=p;}});
  let hardest=null,easiest=null;
  perMatch.forEach(x=>{ if(hardest===null||x.hits<hardest.hits)hardest=x; if(easiest===null||x.hits>easiest.hits)easiest=x; });
  let upP=null,upMin=2,upM=null;
  dm.forEach(m=>pids.forEach(p=>{
    const pr=PRED[m.id]&&PRED[m.id][p];
    if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as)){
      const od=matchOdds(m),hs=Number(m.hs),as=Number(m.as);
      const pw=hs>as?od.h/100:hs<as?od.a/100:(od.three?od.d:50)/100;
      if(pw<upMin){upMin=pw;upP=p;upM=m;}
    }
  }));
  return {dm,teP,teN,bsP,bsN,topScore,topScoreN,hardest,easiest,upP,upMin,upM};
}
function lastRound(){
  const byStage={};
  sortedMatches().forEach(m=>{if(m.done)(byStage[m.stage]=byStage[m.stage]||[]).push(m);});
  let stage=null,maxK=-1;
  Object.entries(byStage).forEach(([st,ms])=>{const mk=Math.max.apply(null,ms.map(m=>m.kickoff));if(mk>maxK){maxK=mk;stage=st;}});
  if(!stage)return null;
  const pts={}; Object.keys(PART).forEach(p=>pts[p]=0);
  byStage[stage].forEach(m=>Object.keys(PART).forEach(p=>{const pr=PRED[m.id]&&PRED[m.id][p];if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))pts[p]++;}));
  return {stage,rank:Object.entries(pts).sort((a,b)=>b[1]-a[1])};
}

  if(st.topScore)c+=card('📊','Najczęstszy typ', st.topScore, `obstawiony ${st.topScoreN}×`);

  return c;
}

/* ---------- v2: Staty tab (raport, H2H, wykres, odznaki) ---------- */
function computeRanks(filter){
  const arr=Object.entries(PART).map(([pid,p])=>{
    let cor=0;
    Object.entries(MATCH).forEach(([mid,m])=>{
      if(!m.done||!filter(m))return;
      const pr=PRED[mid]&&PRED[mid][pid];
      if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))cor++;
    });
    return {pid,total:Number(p.start||0)+cor};
  }).sort((a,b)=>b.total-a.total||a.pid.localeCompare(b.pid));
  const r={}; arr.forEach((x,i)=>r[x.pid]=i+1); return r;
}
function roundReportText(){
  const lr=lastRound(); if(!lr)return null;
  const ms=sortedMatches().filter(m=>m.done&&m.stage===lr.stage);
  if(!ms.length)return null;
  const roundStart=Math.min.apply(null,ms.map(m=>m.kickoff));
  const before=computeRanks(m=>m.kickoff<roundStart), now=computeRanks(()=>true);
  const nm=p=>(PART[p]&&PART[p].name)||'—';
  const top=lr.rank.filter(x=>x[1]>0)[0];
  let climber=null,cval=0,faller=null,fval=0;
  Object.keys(PART).forEach(p=>{const d=(before[p]||now[p])-now[p];if(d>cval){cval=d;climber=p;}if(d<fval){fval=d;faller=p;}});
  const lead=standings()[0];
  let t=`📋 Raport po rundzie — ${lr.stage}\n`;
  if(top)t+=`🥇 Najlepszy: ${nm(top[0])} (${top[1]} pkt w rundzie)\n`;
  if(climber&&cval>0)t+=`📈 Skok rundy: ${nm(climber)} (awans o ${cval})\n`;
  if(faller&&fval<0)t+=`📉 Spadek rundy: ${nm(faller)} (spadek o ${-fval})\n`;
  if(lead)t+=`👑 Prowadzi: ${lead.name} (${lead.total} pkt)`;
  return t;
}
function roundReportCard(){

function ptsFor(pr,m){return pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as)?1:0;}
function h2hCard(){
  const pids=Object.keys(PART);
  if(pids.length<2)return '<div class="card muted">Potrzeba min. 2 graczy.</div>';
  if(!H2H_A||!PART[H2H_A])H2H_A=pids[0];
  if(!H2H_B||!PART[H2H_B])H2H_B=pids[1]||pids[0];
  const opt=sel=>pids.map(p=>`<option value="${p}" ${p===sel?'selected':''}>${esc(PART[p].name)}</option>`).join('');
  let aP=0,bP=0,aw=0,bw=0,dr=0,n=0;
  sortedMatches().forEach(m=>{
    if(!m.done)return;
    const pa=PRED[m.id]&&PRED[m.id][H2H_A], pb=PRED[m.id]&&PRED[m.id][H2H_B];
    if(!pa&&!pb)return;
    const sa=ptsFor(pa,m), sb=ptsFor(pb,m); aP+=sa;bP+=sb;n++;

    <div class="hint center">W ${n} wspólnych meczach lepszy był: ${esc(PART[H2H_A].name)} ${aw}× · ${esc(PART[H2H_B].name)} ${bw}× · remisów ${dr}. (punkty klasyczne)</div>

}
function positionChartCard(){
  const done=sortedMatches().filter(m=>m.done);
  const pids=Object.keys(PART);
  if(done.length<2||pids.length<2)return '<div class="card muted">Wykres pojawi się po kilku meczach.</div>';
  const cum={}; pids.forEach(p=>cum[p]=Number(PART[p].start||0));
  const steps=[];
  done.forEach(m=>{
    pids.forEach(p=>{const pr=PRED[m.id]&&PRED[m.id][p];if(pr&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))cum[p]++;});
    const order=pids.slice().sort((a,b)=>cum[b]-cum[a]||a.localeCompare(b));
    const r={}; order.forEach((p,i)=>r[p]=i+1); steps.push(r);
  });
  const N=steps.length,P=pids.length,W=520,Hc=210,padL=20,padR=14,padT=12,padB=12;
  const innerW=W-padL-padR, innerH=Hc-padT-padB;
  const X=i=>padL+(N===1?innerW/2:innerW*i/(N-1));
  const Y=rk=>padT+(P===1?innerH/2:innerH*(rk-1)/(P-1));
  const colors=['#E8B23A','#2E9E5B','#C2533B','#3B7BC2','#9B5BC2','#16A0A0','#C2853B','#7A8A2E','#C23B7B','#5B6BC2','#3BAE6B','#B0413B'];
  let grid='';
  for(let r=1;r<=P;r++){const yy=Y(r).toFixed(1);grid+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#EDE9DF" stroke-width="1"/><text x="3" y="${(parseFloat(yy)+3).toFixed(1)}" font-size="9" fill="#9AA199">${r}</text>`;}
  let lines='',dots='',legend='';
  pids.forEach((p,pi)=>{
    const col=colors[pi%colors.length]; let d='';
    steps.forEach((s,i)=>{d+=(i===0?'M':'L')+X(i).toFixed(1)+' '+Y(s[p]).toFixed(1)+' ';});
    lines+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" opacity="0.92"/>`;
    dots+=`<circle cx="${X(N-1).toFixed(1)}" cy="${Y(steps[N-1][p]).toFixed(1)}" r="3.6" fill="${col}"/>`;
    legend+=`<span style="display:inline-flex;align-items:center;gap:5px;margin:2px 9px 2px 0;font-size:12px"><span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block"></span>${esc(PART[p].name)}</span>`;
  });
  return `<div class="card">
    <svg viewBox="0 0 ${W} ${Hc}" style="width:100%;height:auto;display:block">${grid}${lines}${dots}</svg>
    <div style="margin-top:8px">${legend}</div>
    <div class="hint">Miejsce w klasyfikacji po każdym rozegranym meczu (góra = 1. miejsce).</div>
  </div>`;
}

  if(!arcs.length)return '';

    const sk=(a.standingsKicktipp||[]).find(r=>r.pid===pid);

    ed++;
    if(sk){kick+=Number(sk.total||0);
      if(a.standingsKicktipp[0]&&a.standingsKicktipp[0].pid===pid)titles.push(a.name);}
    if(sc)ex+=Number(sc.correct||0);
    (((a.badges||{})[pid])||[]).forEach(b=>badgeSet.add(b&&b.n?b.n:b));
  });
  if(!ed)return '';
  const edw=ed===1?'edycja':((ed>=2&&ed<=4)?'edycje':'edycji');

}

function earnedBadges(pid){
  const b=[]; const dm=sortedMatches().filter(m=>m.done);
  let exactTotal=0,predTotal=0,cur=0,best=0,zero=false,giant=false,missedAny=false;
  const sH={},sP={};
  dm.forEach(m=>{
    const pr=PRED[m.id]&&PRED[m.id][pid];
    if(pr){
      predTotal++; const ex=Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as);
      sP[m.stage]=(sP[m.stage]||0)+1;
      if(ex){exactTotal++;cur++;if(cur>best)best=cur; if(Number(m.hs)===0&&Number(m.as)===0)zero=true;
        sH[m.stage]=(sH[m.stage]||0)+1;
        const od=matchOdds(m),hs=Number(m.hs),as=Number(m.as);
        const pw=hs>as?od.h/100:hs<as?od.a/100:(od.three?od.d:50)/100; if(pw<0.25)giant=true;
      } else cur=0;
    } else missedAny=true;
  });
  let komplet=false; Object.keys(sP).forEach(s=>{if(sP[s]>=2&&sH[s]===sP[s])komplet=true;});
  if(best>=3)b.push({e:'🔮',n:'Jasnowidz',d:'3+ dokładne z rzędu'});
  if(exactTotal>=5)b.push({e:'🎯',n:'Snajper',d:'5+ dokładnych trafień'});
  if(giant)b.push({e:'🐉',n:'Pogromca gigantów',d:'trafiony underdog <25%'});
  if(zero)b.push({e:'🧱',n:'Murowany',d:'trafione 0:0'});
  if(komplet)b.push({e:'💯',n:'Komplet rundy',d:'cały etap dokładnie'});
  if(cur>=2)b.push({e:'🔥',n:'Gorąca ręka',d:'aktualna seria 2+'});
  if(dm.length>=5&&predTotal===dm.length&&!missedAny)b.push({e:'🗳️',n:'Sumienny',d:'obstawił każdy mecz'});

  // Finalista: obstawił mecz finałowy
  const finalEntry=Object.entries(MATCH).find(([id,m])=>(m.stage||'')==='Finał');
  if(finalEntry&&PRED[finalEntry[0]]&&PRED[finalEntry[0]][pid])b.push({e:'🏅',n:'Finalista',d:'obstawił mecz finałowy'});

  // Pierwszy strzał: pierwsze dokładne trafienie w całym turnieju
  let firstHitMatch=null;
  for(const m of dm){
    const hitHere=Object.keys(PART).some(p2=>{const pr2=PRED[m.id]&&PRED[m.id][p2];return pr2&&Number(pr2.h)===Number(m.hs)&&Number(pr2.a)===Number(m.as);});
    if(hitHere){firstHitMatch=m;break;}
  }
  if(firstHitMatch){
    const prMe=PRED[firstHitMatch.id]&&PRED[firstHitMatch.id][pid];
    if(prMe&&Number(prMe.h)===Number(firstHitMatch.hs)&&Number(prMe.a)===Number(firstHitMatch.as))
      b.push({e:'🥇',n:'Pierwszy strzał',d:'pierwsze dokładne trafienie turnieju'});
  }

  // Styl typowania: nocna zmiana / błyskawica / ostatnia chwila (na bazie znacznika czasu zapisu typu)
  let nightOwl=false, earlyBird=false, lastMinute=false;
  Object.entries(MATCH).forEach(([mid,m])=>{
    const pr=PRED[mid]&&PRED[mid][pid];
    if(!pr||!pr.ts)return;
    const hr=new Date(pr.ts).getHours();
    if(hr>=0&&hr<5)nightOwl=true;
    const diff=m.kickoff-pr.ts;
    if(diff>=48*3600*1000)earlyBird=true;
    if(diff>=0&&diff<=15*60*1000)lastMinute=true;
  });
  if(nightOwl)b.push({e:'🌙',n:'Nocna zmiana',d:'typ wysłany między północą a 5 rano'});
  if(earlyBird)b.push({e:'⚡',n:'Błyskawica',d:'typ zapisany 48h+ przed pierwszym gwizdkiem'});
  if(lastMinute)b.push({e:'🐢',n:'Ostatnia chwila',d:'typ zapisany w ostatnich 15 minutach przed zamknięciem'});

  // Zgodny z tłumem / Inaczej niż wszyscy: porównanie typu z resztą grupy
  let zgodnyCount=0, uniqueHit=false;
  dm.forEach(m=>{
    const preds=Object.entries(PRED[m.id]||{}).filter(([p2])=>PART[p2]);
    if(preds.length<2)return;
    const counts={};
    preds.forEach(([p2,pr2])=>{const k=pr2.h+':'+pr2.a;counts[k]=(counts[k]||0)+1;});
    const prMe=PRED[m.id]&&PRED[m.id][pid];
    if(!prMe)return;
    const kMe=prMe.h+':'+prMe.a;
    const maxCount=Math.max.apply(null,Object.values(counts));
    if(counts[kMe]===maxCount&&maxCount>1)zgodnyCount++;
    const exact=Number(prMe.h)===Number(m.hs)&&Number(prMe.a)===Number(m.as);
    if(exact&&counts[kMe]===1)uniqueHit=true;
  });
  if(zgodnyCount>=5)b.push({e:'🤝',n:'Zgodny z tłumem',d:'5+ razy typ zgodny z większością grupy'});
  if(uniqueHit)b.push({e:'🦄',n:'Inaczej niż wszyscy',d:'trafiony wynik, który typował tylko on'});

  // Underdog wierny / Showman: odważne typy na bazie kursów
  let underdogCount=0, showman=false;
  dm.forEach(m=>{
    const pr=PRED[m.id]&&PRED[m.id][pid]; if(!pr)return;
    const ph=Number(pr.h),pa=Number(pr.a);
    const od=matchOdds(m);
    let winProbPct;
    if(ph>pa)winProbPct=od.h;
    else if(ph<pa)winProbPct=od.a;
    else winProbPct=od.three?od.d:50;
    if(winProbPct<35)underdogCount++;
    if(Math.abs(ph-pa)>=4&&Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as))showman=true;
  });
  if(underdogCount>=3)b.push({e:'📉',n:'Underdog wierny',d:'3+ razy postawił na zespół z szansą <35%'});
  if(showman)b.push({e:'🎪',n:'Showman',d:'trafiony wynik z różnicą 4+ goli'});

  return b;
}

function statProfil(){
  const rows=Object.entries(PART).map(([pid,p])=>{
    let n=0,g=0,home=0,draw=0,away=0;
    Object.entries(PRED).forEach(([mid,byP])=>{
      const pr=byP[pid]; if(!pr||!MATCH[mid])return;
      n++; g+=Number(pr.h)+Number(pr.a);
      if(pr.h>pr.a)home++; else if(pr.h<pr.a)away++; else draw++;
    });
    if(!n)return null;
    return {name:p.name,n,avg:(g/n).toFixed(1),home:Math.round(home/n*100),draw:Math.round(draw/n*100),away:Math.round(away/n*100)};
  }).filter(Boolean).sort((a,b)=>b.avg-a.avg);
  if(!rows.length)return '<div class="card muted">Brak typów.</div>';
  const html=rows.map(r=>`<div class="prow"><span class="nm">${esc(r.name)}</span>
    <span class="muted" style="font-size:12px;text-align:right">śr. <b>${r.avg}</b> gola/typ · 🏠${r.home}% 🤝${r.draw}% ✈️${r.away}%</span></div>`).join('');
  return `<div class="card">${html}<div class="hint" style="margin-top:8px">Śr. goli w typie mówi, kto wierzy w festiwal strzelecki. 🏠 = typy na gospodarza, 🤝 na remis, ✈️ na gościa.</div></div>`;
}
function statForma(){
  const dm=sortedMatches().filter(m=>m.done).slice(-5);
  if(dm.length<2)return '<div class="card muted">Za mało rozegranych meczów.</div>';
  const rows=Object.entries(PART).map(([pid,p])=>{
    let pts=0;const ic=dm.map(m=>{
      const pr=PRED[m.id]&&PRED[m.id][pid];
      if(!pr)return '<span style="opacity:.35">·</span>';
      const mult=pr.j?2:1;
      if(Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as)){pts+=3*mult;return '🟢';}
      if(Math.sign(pr.h-pr.a)===Math.sign(m.hs-m.as)){pts+=1*mult;return '🟡';}
      return '🔴';
    }).join('');
    return {name:p.name,pts,ic};
  }).sort((a,b)=>b.pts-a.pts);
  const html=rows.map((r,i)=>`<div class="prow"><span class="nm">${i===0&&r.pts>0?'🔥 ':''}${esc(r.name)}</span>

}
function statPulapki(){
  const dm=sortedMatches().filter(m=>m.done);
  const scored=dm.map(m=>{
    const prs=Object.entries(PRED[m.id]||{}).filter(([p2])=>PART[p2]);
    if(prs.length<2)return null;
    const hits=prs.filter(([,pr])=>Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as)).length;
    return {m,total:prs.length,hits};
  }).filter(Boolean);

  const easy=scored.filter(x=>x.hits>0).sort((a,b)=>b.hits-a.hits||a.total-b.total).slice(0,3);
  const traps=scored.filter(x=>x.hits===0);
  const line=x=>`<div class="prow"><span class="nm">${team(x.m.home).f} ${esc(team(x.m.home).pl)} ${x.m.hs}:${x.m.as} ${esc(team(x.m.away).pl)} ${team(x.m.away).f}</span><span class="muted" style="font-size:12px">${x.hits}/${x.total} trafiło</span></div>`;

    <b style="font-size:13px;display:block;margin-top:${easy.length?'10px':'0'}">🪤 Mecze-pułapki (nikt nie trafił): ${traps.length} z ${scored.length}</b>
    ${traps.length?`<div class="hint" style="margin-top:4px">Ostatnia pułapka: ${(x=>`${team(x.m.home).pl} ${x.m.hs}:${x.m.as} ${team(x.m.away).pl}`)(traps[traps.length-1])}</div>`:''}
  </div>`;
}
function statBlizniacza(){
  if(!ME||!PART[ME])return '<div class="card muted">Zaloguj się, by zobaczyć swój bliźniak.</div>';
  const sims=Object.keys(PART).filter(p=>p!==ME).map(pid=>{
    let common=0,score=0;
    Object.values(PRED).forEach(obj=>{const a=obj[ME],b=obj[pid];if(!a||!b)return;common++;
      if(Number(a.h)===Number(b.h)&&Number(a.a)===Number(b.a))score+=1;
      else if(Math.sign(Number(a.h)-Number(a.a))===Math.sign(Number(b.h)-Number(b.a)))score+=0.5;});
    return {name:PART[pid].name,common,sim:common?score/common:0};
  }).filter(x=>x.common>=3);
  if(!sims.length)return '<div class="card muted">Za mało wspólnych typów (potrzeba kilku), żeby to policzyć.</div>';
  sims.sort((a,b)=>b.sim-a.sim);
  const twin=sims[0], nem=sims[sims.length-1];
  const c=(e,label,x)=>`<div class="spot"><div class="spot-e">${e}</div><div><div class="spot-t">${label}</div><div class="spot-v"><b>${esc(x.name)}</b> — zgodność ${Math.round(x.sim*100)}%</div><div class="spot-s">na ${x.common} wspólnych typach</div></div></div>`;
  let out=c('👯','Dusza bliźniacza',twin);
  if(sims.length>1 && nem.name!==twin.name) out+=c('😈','Nemezis',nem);
  return out;
}
function statOdwaga(){
  const done=sortedMatches().filter(m=>m.done);
  const acc={}; Object.keys(PART).forEach(pid=>acc[pid]={name:PART[pid].name,brave:0,braveHit:0});
  done.forEach(m=>{
    const preds=Object.entries(PRED[m.id]||{}).filter(([pid])=>PART[pid]);
    if(preds.length<2)return;
    const cnt={'-1':0,'0':0,'1':0};
    preds.forEach(([pid,pr])=>{cnt[String(Math.sign(Number(pr.h)-Number(pr.a)))]++;});
    let maj='0',mx=-1;['1','0','-1'].forEach(k=>{if(cnt[k]>mx){mx=cnt[k];maj=k;}});
    const actual=String(Math.sign(Number(m.hs)-Number(m.as)));
    preds.forEach(([pid,pr])=>{const t=String(Math.sign(Number(pr.h)-Number(pr.a)));if(t!==maj){acc[pid].brave++;if(t===actual)acc[pid].braveHit++;}});
  });
  const rows=Object.values(acc).sort((a,b)=>b.brave-a.brave||b.braveHit-a.braveHit);
  if(!rows.some(r=>r.brave>0))return '<div class="card muted">Na razie wszyscy typują podobnie — brak danych o odwadze.</div>';
  return `<div class="card">`+rows.map((r,i)=>`<div class="prow"><span class="nm">${i===0?'🦁 ':''}${esc(r.name)}</span><span class="pv">${r.brave} <span class="muted" style="font-weight:400;font-size:11px">pod prąd · ${r.braveHit} trafione</span></span></div>`).join('')+`<div class="hint" style="margin-top:8px">Ile razy ktoś typował inaczej niż większość — i ile z tego trafił (tłum się mylił, on nie).</div></div>`;
}
function statFazy(){
  const done=sortedMatches().filter(m=>m.done);
  if(!done.length)return '<div class="card muted">Brak danych.</div>';
  const rows=Object.entries(PART).map(([pid,p])=>{
    let gp=0,gh=0,kp=0,kh=0;
    done.forEach(m=>{const pr=PRED[m.id]&&PRED[m.id][pid];if(!pr)return;
      const ex=Number(pr.h)===Number(m.hs)&&Number(pr.a)===Number(m.as);
      if((m.stage||'')==='Faza grupowa'){gp++;if(ex)gh++;}else{kp++;if(ex)kh++;}});
    return {name:p.name,gp,gh,kp,kh,kPct:kp?kh/kp:0};
  }).sort((a,b)=>b.kPct-a.kPct);
  const cell=(h,n)=>n?`${Math.round(h/n*100)}% <span class="muted" style="font-weight:400;font-size:10px">(${h}/${n})</span>`:'<span class="muted">—</span>';
  return `<div class="card">
    <div class="prow" style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700"><span class="nm">Gracz</span><span style="display:flex;gap:12px"><span style="width:72px;text-align:right">Grupa</span><span style="width:72px;text-align:right">Puchary</span></span></div>
    ${rows.map(r=>`<div class="prow"><span class="nm">${esc(r.name)}</span><span style="display:flex;gap:12px;font-size:13px"><span style="width:72px;text-align:right">${cell(r.gh,r.gp)}</span><span style="width:72px;text-align:right">${cell(r.kh,r.kp)}</span></span></div>`).join('')}
    <div class="hint" style="margin-top:8px">Skuteczność dokładnych trafień: faza grupowa vs puchary (sortowane po pucharach).</div></div>`;
}
function statFrekwencja(){
  const done=sortedMatches().filter(m=>m.done);
  if(!done.length)return '<div class="card muted">Brak danych.</div>';
  const rows=Object.entries(PART).map(([pid,p])=>{

/* ---------- Naprawa polskich znaków (mojibake) w etapach ---------- */
function fixPolish(s){
  return String(s||'')
    .replace(/Ä…/g,'ą').replace(/Ä‡/g,'ć').replace(/Ä™/g,'ę').replace(/Ĺ‚/g,'ł').replace(/Ĺ„/g,'ń')
    .replace(/Ăł/g,'ó').replace(/Ĺ›/g,'ś').replace(/Ĺş/g,'ź').replace(/ĹĽ/g,'ż')
    .replace(/Ä„/g,'Ą').replace(/Ä†/g,'Ć').replace(/Ä˜/g,'Ę').replace(/Ĺƒ/g,'Ń')
    .replace(/Ă“/g,'Ó').replace(/Ĺš/g,'Ś').replace(/Ĺą/g,'Ź').replace(/Ĺ»/g,'Ż')
    .replace(/Ĺ/g,'Ł').replace(/\uFFFD/g,'');
}
function canonStage(s){
  const t=fixPolish(s).toLowerCase().trim();
  if(t.indexOf('faza grupowa')===0)return 'Faza grupowa';
  if(t.indexOf('1/16')===0)return '1/16 finału';
  if(t.indexOf('1/8')===0)return '1/8 finału';
  if(t.indexOf('1/4')===0)return '1/4 finału';
  if(t.indexOf('1/2')===0||t.indexOf('półfina')>=0)return '1/2 finału';
  if(t.indexOf('3. miejsce')>=0||t.indexOf('3 miejsce')>=0)return 'Mecz o 3. miejsce';
  if(t.indexOf('fina')===0)return 'Finał';
  return null;
}
function repairStages(){
  const up={};let n=0;const zmiany={};
  Object.entries(MATCH).forEach(([id,m])=>{
    const c=canonStage(m.stage);
    if(c&&c!==m.stage){up['matches/'+id+'/stage']=c;n++;zmiany[m.stage]=c;}
  });
  if(!n){alert('Wszystkie etapy wyglądają dobrze — nie ma czego naprawiać. 👍');return;}
  const lista=Object.entries(zmiany).map(([od,na])=>'„'+od+'” → „'+na+'”').join('\n');
  if(!confirm('Naprawić nazwy etapów w '+n+' meczach?\n\n'+lista+'\n\nTypy i wyniki zostają bez zmian.'))return;
  db.ref().update(up).then(()=>flash('Naprawiono etapy w '+n+' meczach ✅')).catch(e=>alert(dbErrMsg(e)));
}
function addBulk(){
  const raw=($('bulk').value||'').trim(); if(!raw){alert('Wklej listę meczów.');return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const up={}; let ok=0; const errs=[]; const dupes=[];
  lines.forEach(line=>{
    const parts=line.split(/\s+/); let h,a,rest;
    if(parts[0].includes('-')){const x=parts[0].split('-');h=x[0];a=x[1];rest=parts.slice(1);}
    else {h=parts[0];a=parts[1];rest=parts.slice(2);}
    h=(h||'').toUpperCase(); a=(a||'').toUpperCase();
    const date=rest[0],time=rest[1];
    let stage=rest.slice(2).join(' ')||'Mecz', grp=null;
    const gm=stage.match(/^(Faza grupowa)\s+([A-La-l])$/);
    if(gm){stage=gm[1];grp=gm[2].toUpperCase();}
    stage=canonStage(stage)||stage;
    if(!TEAMS[h]||!TEAMS[a]||h===a||!date||!time||!/^\d{1,2}\.\d{1,2}$/.test(date)||!/^\d{1,2}:\d{2}$/.test(time)){errs.push(line);return;}
    const exists=Object.values(MATCH).some(mm=>(canonStage(mm.stage)||mm.stage)===stage&&((mm.home===h&&mm.away===a)||(mm.home===a&&mm.away===h)));
    if(exists){dupes.push(line);return;}
    const dp=date.split('.'),iso='2026-'+dp[1].padStart(2,'0')+'-'+dp[0].padStart(2,'0')+'T'+time.padStart(5,'0');
    const k=new Date(iso).getTime(); if(isNaN(k)){errs.push(line);return;}
    const id=db.ref('matches').push().key; up['matches/'+id]={home:h,away:a,kickoff:k,stage,grp}; ok++;
  });
  if(!ok){alert(dupes.length?('Wszystkie mecze już istnieją w bazie ('+dupes.length+').'):'Nie rozpoznałam żadnej linii. Sprawdź format: KOD1 KOD2 DD.MM GG:MM Etap');return;}
  db.ref().update(up).then(()=>{$('bulk').value='';flash('Dodano '+ok+' meczów'+(dupes.length?' · pominięto (już były) '+dupes.length:'')+(errs.length?' · błędnych '+errs.length:''));});
}

const NOTIF_TRACKED = {}; // mid -> { resultSent, hour1Sent }
let NOTIF_READY = false; // po pierwszym załadowaniu nie pokazuj dymków dla już rozegranych meczów
let bannerQueue = [];
let bannerActive = false;

function inappBanner(icon, type, title, body, onTap){
  // queue so multiple banners don't overlap
  bannerQueue.push({icon,type,title,body,onTap});
  if(!bannerActive) nextBanner();
}

function nextBanner(){
  if(!bannerQueue.length){ bannerActive=false; return; }
  bannerActive=true;
  const {icon,type,title,body,onTap}=bannerQueue.shift();
  const el=document.createElement('div');
  el.className=`inapp-banner ${type}`;
  el.innerHTML=`
    <div class="inapp-banner-ic">${icon}</div>
    <div class="inapp-banner-body" style="cursor:${onTap?'pointer':'default'}" onclick="this.closest('.inapp-banner')._tap&&this.closest('.inapp-banner')._tap()">
      <div class="inapp-banner-title">${esc(title)}</div>
      <div>${esc(body)}</div>
    </div>
    <button class="inapp-banner-x" onclick="this.closest('.inapp-banner').remove();setTimeout(nextBanner,300)">×</button>`;
  if(onTap) el._tap=onTap;
  document.body.appendChild(el);
  // auto-dismiss after 5s
  setTimeout(()=>{ el.style.animation='slideDown .3s ease-out reverse'; setTimeout(()=>{el.remove();setTimeout(nextBanner,300);},280); }, 5000);
}
window.nextBanner=nextBanner;

function notifCheck(){
  if(!ME||!PART[ME])return;
  const now=Date.now();
  // Pierwsze załadowanie po zalogowaniu: oznacz wszystkie obecne mecze jako „już widziane",
  // żeby stare wyniki nie wyskakiwały dymkami. Dymki pojawią się tylko dla NOWYCH zdarzeń.
  if(!NOTIF_READY){
    if(!Object.keys(MATCH).length) return;
    Object.entries(MATCH).forEach(([mid,m])=>{
      NOTIF_TRACKED[mid]=NOTIF_TRACKED[mid]||{};
      if(m.done)NOTIF_TRACKED[mid].resultSent=true;
      if((m.kickoff-now)<=3600000)NOTIF_TRACKED[mid].hour1Sent=true;
    });
    NOTIF_READY=true;
    return;
  }
  Object.entries(MATCH).forEach(([mid,m])=>{
    if(!NOTIF_TRACKED[mid]) NOTIF_TRACKED[mid]={};
    const t=NOTIF_TRACKED[mid];
    const H=team(m.home).pl, A=team(m.away).pl;
    const myPred=PRED[mid]&&PRED[mid][ME];
    const msToKick=m.kickoff-now;

    // ① Wynik wpisany przez admina
    if(m.done && !t.resultSent){
      t.resultSent=true;
      const hit=myPred&&Number(myPred.h)===Number(m.hs)&&Number(myPred.a)===Number(m.as);
      if(hit){
        inappBanner('✅','green',`Trafiony wynik!`,`${H} ${m.hs}:${m.as} ${A} — dobry typ!`,()=>go('rozegrane'));
      } else {
        const typTxt=myPred?` Twój typ: ${myPred.h}:${myPred.a}.`:'';
        inappBanner('🏁','amber','Mecz zakończony',`${H} ${m.hs}:${m.as} ${A}.${typTxt}`,()=>go('rozegrane'));
      }
    }

    // ② Godzinę przed meczem — brak typu
    if(!m.done && !myPred && msToKick>0 && msToKick<=60*60*1000 && !t.hour1Sent){
      t.hour1Sent=true;
      inappBanner('⚠️','amber','Nie obstawiłeś meczu!',`${H} vs ${A} — zostało ~${Math.round(msToKick/60000)} min`,()=>go('mecze'));
    }
  });
}

const MAX_IMG_KB = 400; // kompresja do max ~400KB base64

function openImgPicker(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files&&e.target.files[0]; if(!file)return;
    if(!file.type||file.type.indexOf('image/')!==0){ alert('To nie jest zdjęcie. Wybierz obrazek z galerii telefonu.'); return; }
    if(!file.size){ alert('Nie udało się wczytać pliku (wygląda na to, że jest w chmurze, a nie na telefonie).\n\nWybierz zdjęcie z GALERII/ZDJĘĆ, a nie z Dysku Google — albo najpierw pobierz je na telefon.'); return; }
    const reader=new FileReader();
    reader.onerror=()=>alert('Nie udało się odczytać pliku. Spróbuj innego zdjęcia z galerii (nie z chmury).');
    reader.onload=ev=>{
      const orig=ev.target.result;
      if(!orig || String(orig).length<100){ alert('Puste zdjęcie — nic nie wysłano. Spróbuj innego pliku.'); return; }
      compressImg(orig, MAX_IMG_KB, (compressed)=>{
        if(!compressed || compressed.indexOf('data:image')!==0 || compressed.length<200){ alert('Nie udało się przetworzyć zdjęcia. Możliwe, że jest w formacie HEIC (z iPhone\u2019a) — zrób zrzut ekranu tego zdjęcia i wyślij zrzut, albo wybierz inne.'); return; }
        if(!confirm('Wysłać zdjęcie na czat?'))return;
        db.ref('chat').push({pid:ME,name:PART[ME].name,img:compressed,ts:Date.now()})
          .catch(e=>alert(dbErrMsg(e)));
      }, ()=>alert('Nie udało się wczytać zdjęcia (może format HEIC lub uszkodzony plik). Zrób zrzut ekranu i wyślij zrzut, albo wybierz inne zdjęcie.'));
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function compressImg(dataUrl, maxKB, cb, onErr){
  const img=new Image();
  img.onerror=()=>{ if(onErr)onErr(); };
  img.onload=()=>{
    let w=img.width, h=img.height;
    if(!w||!h){ if(onErr)onErr(); return; }
    const maxPx=1200;
    if(w>maxPx||h>maxPx){ const r=Math.min(maxPx/w,maxPx/h); w=Math.round(w*r); h=Math.round(h*r); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    let q=0.82;
    let out=c.toDataURL('image/jpeg',q);
    while(out.length>maxKB*1024*1.37 && q>0.3){ q-=0.08; out=c.toDataURL('image/jpeg',q); }
    cb(out);
  };
  img.src=dataUrl;
}

function showTeamHistory(code){
  const t=team(code);
  const played=sortedMatches().filter(m=>m.done&&(m.home===code||m.away===code));

  if(!played.length){
    const ov=document.createElement('div');
    ov.className='ovl'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
    ov.innerHTML=`<div class="sheet"><button class="x" onclick="this.closest('.ovl').remove()">Zamknij</button>
      <span class="team-hist-flag">${t.f}</span><div class="team-hist-name">${esc(t.pl)}</div>
